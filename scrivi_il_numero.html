<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematiche non si nasce</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}

/* HEADER */
header{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:22px;width:100%;max-width:680px;}
header a{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;}
.logo img{width:60px;height:60px;object-fit:contain;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.blog-name{font-size:1.15rem;font-weight:800;color:#2c3e7a;letter-spacing:0.5px;text-align:center;}

/* LEVELS */
.levels{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;}
.lvl-btn{padding:10px 20px;border:2px solid #2c3e7a;border-radius:10px;background:white;color:#2c3e7a;font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;text-align:center;}
.lvl-btn.active{background:#2c3e7a;color:white;}
.lvl-btn:hover{background:#5b7cff;color:white;border-color:#5b7cff;}

/* CARD */
.card{background:white;border-radius:16px;padding:28px 20px;box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:680px;width:100%;text-align:center;}
.number-display{font-size:3rem;font-weight:800;color:#2c3e7a;margin-bottom:22px;line-height:1.1;}

/* ANSWER AREA - inline flow */
.answer-flow{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:5px;margin-bottom:18px;padding:10px;}
.box{width:28px;height:40px;border:2px solid #2c3e7a;border-radius:5px;font-size:1rem;font-weight:700;text-align:center;text-transform:uppercase;color:#2c3e7a;background:#f0f4ff;outline:none;caret-color:transparent;transition:border-color 0.2s,background 0.2s;}
.box:focus{border-color:#5b7cff;background:#e8eeff;}
.box.correct{border-color:#27ae60;background:#eafaf1;color:#27ae60;}
.box.wrong{border-color:#e74c3c;background:#fdecea;color:#e74c3c;}

/* SEPARATOR SLOT */
.sep-slot{display:inline-flex;align-items:center;justify-content:center;height:40px;min-width:100px;padding:0 10px;border-radius:8px;font-weight:800;font-size:0.95rem;cursor:pointer;transition:all 0.2s;border:none;white-space:nowrap;}
.sep-slot.empty{background:#3a5fd9;color:rgba(255,255,255,0.4);border:2px dashed #8aaeff;}
.sep-slot.empty:hover{background:#2c3e7a;}
.sep-slot.filled{background:#2c3e7a;color:white;cursor:default;box-shadow:0 2px 6px rgba(44,62,122,0.3);}
.sep-slot.fixed{background:#27ae60;color:white;cursor:default;}
.sep-slot.wrong-slot{background:#e74c3c!important;color:white!important;}

/* HELPER BUTTONS */
.helper-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.helper-btn{padding:9px 20px;border:2px solid #7c5bff;border-radius:10px;background:white;color:#7c5bff;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.2s;}
.helper-btn:hover{background:#7c5bff;color:white;}

.hint{font-size:0.8rem;color:#aaa;margin-bottom:8px;}
.feedback{font-size:1.1rem;font-weight:700;min-height:26px;margin-bottom:14px;color:#27ae60;}
.feedback.error{color:#e74c3c;}
.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn{background:#2c3e7a;color:white;border:none;padding:10px 26px;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn:hover{background:#5b7cff;}
.btn.secondary{background:#aaa;}
.btn.secondary:hover{background:#888;}
.score{margin-top:16px;font-size:0.9rem;color:#888;}
.score span{font-weight:700;color:#2c3e7a;}
</style>
</head>
<body>

<header>
  <a href="https://matematicaconlemani.wordpress.com/" target="_blank">
    <div class="logo"><img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="logo"></div>
    <div class="blog-name">Matematiche non si nasce</div>
  </a>
</header>

<div class="levels">
  <button class="lvl-btn active" onclick="setLevel(1)">Livello 1<br><small>1 – 100</small></button>
  <button class="lvl-btn" onclick="setLevel(2)">Livello 2<br><small>1.000 – 99.999</small></button>
  <button class="lvl-btn" onclick="setLevel(3)">Livello 3<br><small>Milioni e Miliardi</small></button>
</div>

<div class="card">
  <div class="number-display" id="numDisplay">?</div>
  <div class="answer-flow" id="answerFlow"></div>
  <div class="helper-btns" id="helperBtns" style="display:none">
    <button class="helper-btn" onclick="insertSep('MILA')">MILA</button>
    <button class="helper-btn" onclick="insertSep('MILIONI')">MILIONI</button>
    <button class="helper-btn" onclick="insertSep('MILIARDI')">MILIARDI</button>
  </div>
  <div class="hint" id="hint"></div>
  <div class="feedback" id="feedback"></div>
  <div class="btns">
    <button class="btn" onclick="checkAnswer()">Controlla</button>
    <button class="btn secondary" onclick="newNumber()">Nuovo numero</button>
  </div>
  <div class="score">Corretti: <span id="correct">0</span> &nbsp;|&nbsp; Tentativi: <span id="attempts">0</span></div>
</div>

<script>
const U=["","UNO","DUE","TRE","QUATTRO","CINQUE","SEI","SETTE","OTTO","NOVE",
         "DIECI","UNDICI","DODICI","TREDICI","QUATTORDICI","QUINDICI","SEDICI",
         "DICIASSETTE","DICIOTTO","DICIANNOVE"];
const D=["","","VENTI","TRENTA","QUARANTA","CINQUANTA","SESSANTA","SETTANTA","OTTANTA","NOVANTA"];

function decine(n){
  if(n<20)return U[n];
  const d=Math.floor(n/10),r=n%10;
  let base=D[d];
  if(r===1||r===8)base=base.slice(0,-1);
  return base+U[r];
}
function centinaia(n){
  if(n<100)return decine(n);
  const c=Math.floor(n/100),r=n%100;
  let base=(c===1?"":U[c])+"CENTO";
  if(r>=80&&r<90)base=base.slice(0,-1);
  return base+(r>0?decine(r):"");
}
function migliaia(n){
  const m=Math.floor(n/1000),r=n%1000;
  let base=m===1?"MILLE":centinaia(m)+"MILA";
  return base+(r>0?centinaia(r):"");
}
function toItalian(n){
  if(n<1000)return centinaia(n);
  if(n<1000000)return migliaia(n);
  if(n<1000000000){
    const m=Math.floor(n/1000000),r=n%1000000;
    const mp=m===1?"UNMILIONE":centinaia(m)+"MILIONI";
    return mp+(r>0?(r<1000?centinaia(r):migliaia(r)):"");
  }
  const b=Math.floor(n/1000000000),r=n%1000000000;
  const bp=b===1?"UNMILIARDO":centinaia(b)+"MILIARDI";
  let rest="";
  if(r>0){
    if(r<1000)rest=centinaia(r);
    else if(r<1000000)rest=migliaia(r);
    else{const m=Math.floor(r/1000000),rr=r%1000000;rest=(m===1?"UNMILIONE":centinaia(m)+"MILIONI")+(rr>0?(rr<1000?centinaia(rr):migliaia(rr)):"");}
  }
  return bp+rest;
}

// Decompose for level 3
function decompose(n){
  const parts=[];
  if(n>=1000000000){const b=Math.floor(n/1000000000);parts.push({val:b,sep:'MILIARDI',word:b===1?'UN':centinaia(b)});n%=1000000000;}
  if(n>=1000000){const m=Math.floor(n/1000000);parts.push({val:m,sep:'MILIONI',word:m===1?'UN':centinaia(m)});n%=1000000;}
  if(n>=1000){const k=Math.floor(n/1000);parts.push({val:k,sep:'MILA',word:k===1?'':centinaia(k)});n%=1000;}
  if(n>0||parts.length===0)parts.push({val:n,sep:null,word:centinaia(n)});
  return parts;
}

let level=1,current=0,correctCount=0,attemptCount=0;
let segments=[];   // [{inputs:[], sepEl, sep, word, sepFilled}]
let activeSlot=-1; // which slot is selected for next helper click

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function genNumber(){
  if(level===1)return rnd(1,100);
  if(level===2){
    const t=Math.random();
    if(t<0.3)return rnd(1,9)*1000;
    if(t<0.6)return rnd(1,9)*1000+rnd(1,9)*100;
    return rnd(1000,99999);
  }
  // level 3 - più varietà e numeri complessi
  const t=Math.random();
  if(t<0.15)return rnd(1,9)*1000000000; // miliardi tondi
  if(t<0.30)return rnd(1,999)*1000000;   // milioni tondi
  if(t<0.45)return rnd(1,9)*1000000000+rnd(1,999)*1000000; // miliardi+milioni
  if(t<0.55)return rnd(1,9)*1000000000+rnd(1,999)*1000;    // miliardi+mila
  if(t<0.65)return rnd(1,9)*1000000000+rnd(1,999)*1000+rnd(1,999); // miliardi+mila+unità (es. 7mld 2008)
  if(t<0.75)return rnd(1,999)*1000000+rnd(1,999)*1000+rnd(1,999); // milioni+mila+unità
  if(t<0.85)return rnd(1,9)*1000000000+rnd(1,999)*1000000+rnd(1,999)*1000+rnd(1,999); // tutto
  return rnd(1,9)*1000000000+rnd(1,999)*1000000+rnd(1,999); // miliardi+milioni+unità
}

function setLevel(l){
  level=l;
  document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active',i===l-1));
  correctCount=0;attemptCount=0;
  document.getElementById('correct').textContent=0;
  document.getElementById('attempts').textContent=0;
  newNumber();
}

function newNumber(){
  current=genNumber();
  document.getElementById('numDisplay').textContent=current.toLocaleString('it-IT');
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  activeSlot=-1;
  segments=[];
  const flow=document.getElementById('answerFlow');
  flow.innerHTML='';
  const helperDiv=document.getElementById('helperBtns');
  const hintDiv=document.getElementById('hint');

  if(level===3){
    helperDiv.style.display='flex';
    hintDiv.textContent='Scrivi le lettere, poi clicca uno spazio blu e scegli la parola giusta.';
    buildLevel3(flow);
  } else {
    helperDiv.style.display='none';
    hintDiv.textContent='';
    buildSimple(flow, toItalian(current));
  }
}

function buildSimple(flow, word){
  const allInputs=[];
  for(let i=0;i<word.length;i++){
    const inp=makeBox(i,word,allInputs,null);
    flow.appendChild(inp);
    allInputs.push(inp);
  }
  allInputs[0].focus();
}

function makeBox(i,word,inputs,segIdx){
  const inp=document.createElement('input');
  inp.type='text';inp.maxLength=1;inp.className='box';
  inp.addEventListener('input',e=>{
    const v=e.target.value.toUpperCase().replace(/[^A-Z]/g,'');
    e.target.value=v;
    if(v&&i<inputs.length-1)inputs[i+1].focus();
    else if(v&&i===inputs.length-1&&segIdx!==null){
      // move to next segment's first input or slot
      const next=segments[segIdx+1];
      if(next){
        if(next.inputs.length)next.inputs[0].focus();
        else if(next.sepEl)next.sepEl.focus();
      }
    }
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Backspace'&&!e.target.value&&i>0)inputs[i-1].focus();
    if(e.key==='Enter')checkAnswer();
  });
  return inp;
}

function buildLevel3(flow){
  const parts=decompose(current);
  parts.forEach((p,pi)=>{
    const seg={inputs:[],sepEl:null,sep:p.sep,word:p.word,sepFilled:false,val:p.val};
    segments.push(seg);

    // Caselle per la parte numerica
    if(p.word.length>0){
      const inps=[];
      for(let i=0;i<p.word.length;i++){
        const inp=makeBox(i,p.word,inps,pi);
        flow.appendChild(inp);
        inps.push(inp);
      }
      seg.inputs=inps;
    }

    // Slot separatore
    if(p.sep){
      const slot=document.createElement('button');
      slot.className='sep-slot';
      if(p.sep==='MILA'&&p.val===1){
        slot.className='sep-slot fixed';
        slot.textContent='MILLE';
        slot.disabled=true;
        seg.sepFilled=true;
      } else {
        slot.className='sep-slot empty';
        slot.textContent='';
        slot.onclick=()=>selectSlot(pi);
      }
      seg.sepEl=slot;
      flow.appendChild(slot);
    }
  });

  // focus primo input
  for(const s of segments){if(s.inputs.length){s.inputs[0].focus();break;}}
}

function selectSlot(pi){
  // deselect previous
  segments.forEach((s,i)=>{
    if(s.sepEl&&!s.sepFilled&&s.sep!=='MILA'||(!s.sepFilled&&i!==pi)){
      if(s.sepEl&&!s.sepFilled) s.sepEl.style.outline='none';
    }
  });
  activeSlot=pi;
  const slot=segments[pi].sepEl;
  slot.style.outline='3px solid #ffcc00';
}

function insertSep(word){
  if(level!==3)return;
  // if a slot is selected, use it; else find first empty of that type
  let pi=activeSlot;
  if(pi<0||pi>=segments.length||segments[pi].sepFilled||segments[pi].sep!==word){
    pi=segments.findIndex(s=>s.sep===word&&!s.sepFilled);
  }
  if(pi===-1)return;
  const s=segments[pi];
  s.sepFilled=true;
  s.sepEl.textContent=word;
  s.sepEl.className='sep-slot filled';
  s.sepEl.style.outline='none';
  s.sepEl.disabled=true;
  activeSlot=-1;
  // focus next
  const next=segments[pi+1];
  if(next&&next.inputs.length)next.inputs[0].focus();
}

function checkAnswer(){
  attemptCount++;
  document.getElementById('attempts').textContent=attemptCount;
  const fb=document.getElementById('feedback');

  if(level===1||level===2){
    const word=toItalian(current);
    const inputs=document.querySelectorAll('.box');
    let filled=true;
    inputs.forEach(b=>{if(!b.value)filled=false;});
    if(!filled){fb.textContent='Completa tutti gli spazi!';fb.className='feedback error';attemptCount--;document.getElementById('attempts').textContent=attemptCount;return;}
    let ok=true;
    inputs.forEach((b,i)=>{
      if(b.value.toUpperCase()===word[i])b.classList.add('correct');
      else{b.classList.add('wrong');ok=false;}
    });
    if(ok){correctCount++;document.getElementById('correct').textContent=correctCount;fb.textContent='Esatto!';fb.className='feedback';setTimeout(newNumber,1200);}
    else{fb.textContent='Riprova!';fb.className='feedback error';setTimeout(()=>{document.querySelectorAll('.box').forEach(b=>{b.classList.remove('correct','wrong');b.value='';});fb.textContent='';document.querySelector('.box').focus();},1100);}
    return;
  }

  // Level 3
  let allOk=true;
  for(let pi=0;pi<segments.length;pi++){
    const s=segments[pi];
    if(s.sep&&!(s.sep==='MILA'&&s.val===1)){
      if(!s.sepFilled){fb.textContent='Inserisci tutte le parole separatrici!';fb.className='feedback error';attemptCount--;document.getElementById('attempts').textContent=attemptCount;return;}
    }
    if(s.word.length>0){
      if(s.inputs.some(b=>!b.value)){fb.textContent='Completa tutti gli spazi!';fb.className='feedback error';attemptCount--;document.getElementById('attempts').textContent=attemptCount;return;}
      s.inputs.forEach((b,i)=>{
        if(b.value.toUpperCase()===s.word[i])b.classList.add('correct');
        else{b.classList.add('wrong');allOk=false;}
      });
    }
  }

  if(allOk){
    correctCount++;document.getElementById('correct').textContent=correctCount;
    fb.textContent='Esatto!';fb.className='feedback';
    setTimeout(newNumber,1500);
  } else {
    fb.textContent='Riprova!';fb.className='feedback error';
    setTimeout(()=>{
      document.querySelectorAll('.box').forEach(b=>{b.classList.remove('correct','wrong');b.value='';});
      fb.textContent='';
      segments.forEach((s,pi)=>{
        if(s.sep&&!(s.sep==='MILA'&&s.val===1)&&s.sepEl){
          s.sepFilled=false;
          s.sepEl.textContent='';
          s.sepEl.className='sep-slot empty';
          s.sepEl.disabled=false;
          s.sepEl.onclick=()=>selectSlot(pi);
        }
      });
      activeSlot=-1;
      for(const s of segments){if(s.inputs.length){s.inputs[0].focus();break;}}
    },1100);
  }
}

newNumber();
</script>
</body>
</html>
