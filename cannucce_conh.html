<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannucce</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #f0ebe0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
  a.logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 4px; cursor: pointer; text-decoration: none; }
  a.logo-wrap img { width: 70px; height: 70px; object-fit: contain; border-radius: 50%; }
  a.logo-wrap span { font-family: 'Georgia', serif; font-style: italic; font-size: 15px; color: #555; letter-spacing: 0.3px; }
  h1 { font-size: 21px; font-weight: 600; color: #333; margin: 8px 0 3px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 18px; text-align: center; }
  .card {
    background: #faf8f3;
    border-radius: 14px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.09);
    padding: 20px 14px 22px;
    width: 100%; max-width: 560px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .col-label {
    font-family: 'Georgia', serif;
    font-style: italic;
    font-size: 22px;
    font-weight: normal;
    color: #222;
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 2px solid #444;
  }
  .col-label.h  { border-right: 1.5px solid #555; }
  .col-label.da { border-right: 1.5px solid #555; }
  .col-content {
    height: 130px;
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    justify-content: center;
    padding: 8px 4px 4px;
    gap: 5px;
  }
  .col-content.h  { border-right: 1.5px solid #555; gap: 4px; }
  .col-content.da { border-right: 1.5px solid #555; gap: 4px; }

  .input-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  input[type=number] {
    width: 100px; height: 46px; font-size: 26px; font-weight: 700;
    text-align: center; border: 2px solid #ccc; border-radius: 10px;
    outline: none; color: #222; background: #fff;
    -moz-appearance: textfield;
  }
  input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; }
  input:focus { border-color: #4a90d9; }
  .btn-check {
    background: #4a90d9; color: #fff; border: none; border-radius: 10px;
    padding: 11px 22px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-check:hover { background: #357abd; }
  .btn-next {
    background: #5cb85c; color: #fff; border: none; border-radius: 10px;
    padding: 11px 22px; font-size: 15px; font-weight: 600; cursor: pointer;
    display: none;
  }
  .btn-next:hover { background: #449d44; }
  .feedback { font-size: 17px; font-weight: 600; min-height: 24px; text-align: center; }
  .feedback.ok  { color: #2e7d2e; }
  .feedback.err { color: #b02020; }
  .score { font-size: 13px; color: #999; }
</style>
</head>
<body>

<a class="logo-wrap" href="https://matematicaconlemani.wordpress.com/" target="_blank">
  <img src="logo.png" alt="Logo">
  <span>Matematiche non si nasce</span>
</a>

<h1>Quante cannucce?</h1>
<p class="subtitle">Scrivi il numero rappresentato dai blocchi (centinaia), mazzetti (decine) e cannucce sciolte (unità)</p>

<div class="card">
  <div class="grid">
    <div class="col-label h">h</div>
    <div class="col-label da">da</div>
    <div class="col-label u">u</div>
    <div class="col-content h"  id="hundreds-area"></div>
    <div class="col-content da" id="tens-area"></div>
    <div class="col-content u"  id="units-area"></div>
  </div>

  <div class="input-row">
    <input type="number" id="answer" placeholder="?" min="1" max="999" />
    <button class="btn-check" onclick="checkAnswer()">Verifica</button>
    <button class="btn-next"  id="btn-next" onclick="nextRound()">Avanti ▶</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="score"    id="score">Punti: 0 / 0</div>
</div>

<script>
// Sizes — all same height
const H  = 90;            // shared height for everything
const HW = 22;            // hundred block width (widest)
const BW = 10;            // ten bundle width
const UW = 3;             // unit width (thinnest)

let target=0, hundreds=0, tens=0, units=0, correct=0, total=0;
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function makeCanvas(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; c.style.display='block'; return c; }

function drawHundred(parent){
  const cv = makeCanvas(HW, H);
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, HW, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 0.8;
  for(let i=1;i<10;i++){
    const y = Math.round(H/10*i);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(HW,y); ctx.stroke();
  }
  // laccio verde incrociato (X)
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(HW, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(HW, 0); ctx.lineTo(0, H); ctx.stroke();
  parent.appendChild(cv);
}

function drawBundle(parent){
  const cv = makeCanvas(BW, H);
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, BW, H);
  ctx.strokeStyle = '#c8860a';
  ctx.lineWidth = 1.5;
  const by = Math.round(H*0.58);
  ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(BW,by); ctx.stroke();
  parent.appendChild(cv);
}

function drawLoose(parent){
  const cv = makeCanvas(UW+2, H);
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#111';
  ctx.fillRect(1, 0, UW, H);
  parent.appendChild(cv);
}

function generateRound(){
  hundreds = rnd(0,9);
  tens     = rnd(0,9);
  units    = rnd(0,9);
  if(hundreds===0 && tens===0 && units===0) units = rnd(1,9);
  target = hundreds*100 + tens*10 + units;

  const hA = document.getElementById('hundreds-area');
  const tA = document.getElementById('tens-area');
  const uA = document.getElementById('units-area');
  hA.innerHTML=''; tA.innerHTML=''; uA.innerHTML='';

  for(let i=0;i<hundreds;i++) drawHundred(hA);
  for(let i=0;i<tens;i++)     drawBundle(tA);
  for(let i=0;i<units;i++)    drawLoose(uA);
}

function checkAnswer(){
  const val = parseInt(document.getElementById('answer').value);
  const fb  = document.getElementById('feedback');
  if(isNaN(val)){ fb.textContent='Inserisci un numero!'; fb.className='feedback err'; return; }
  total++;
  if(val===target){
    correct++;
    fb.textContent='✓ Esatto! Era '+target;
    fb.className='feedback ok';
  } else {
    fb.textContent='✗ Era '+target+' — '+hundreds+' cent., '+tens+' dec., '+units+' unità';
    fb.className='feedback err';
  }
  document.getElementById('score').textContent='Punti: '+correct+' / '+total;
  document.querySelector('.btn-check').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
}

function nextRound(){
  document.getElementById('answer').value='';
  document.getElementById('feedback').textContent='';
  document.querySelector('.btn-check').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('answer').focus();
  generateRound();
}

document.getElementById('answer').addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  if(document.getElementById('btn-next').style.display==='inline-block') nextRound();
  else checkAnswer();
});

generateRound();
</script>
</body>
</html>
