<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pallottoliere — Matematiche non si nasce</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4ef; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  #app { max-width: 680px; margin: 0 auto; }

  .logo-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
  .logo-bar a { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  .logo-bar img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; border: 1.5px solid #ccc; }
  .logo-bar span { font-size: 15px; font-weight: 500; line-height: 1.3; }

  #abacus-container {
    background: #fff; border: 1px solid #ddd; border-radius: 16px;
    padding: 2rem 1.2rem 1.4rem; margin-bottom: 1.4rem;
  }
  #rail { position: relative; height: 44px; margin-bottom: 0.5rem; }
  #rail-line {
    position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
    height: 6px; background: #d0cfc8; border-radius: 3px;
  }
  .divider {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 2px; height: 34px; background: #999; border-radius: 1px; z-index: 3;
  }
  .bead {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 22px; height: 22px; border-radius: 50%; z-index: 2;
    border: 1.5px solid transparent; cursor: pointer;
    transition: left 0.18s ease;
  }
  .bead.white { background: #fff; border-color: #aaa; }
  .bead.red   { background: #e24b4a; border-color: #a32d2d; }
  .bead:hover { filter: brightness(0.88); }

  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-top: 1rem;
  }
  .ctrl-btn {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid #ccc; background: #fff;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #1a1a18; transition: background 0.1s; flex-shrink: 0;
    font-family: inherit; font-weight: 500;
  }
  .ctrl-btn:hover { background: #f0efea; }
  .ctrl-btn.wide { width: auto; padding: 0 14px; border-radius: 22px; font-size: 15px; }
  .sep { width: 1px; height: 28px; background: #ddd; flex-shrink: 0; }
</style>
</head>
<body>
<div class="logo">
  <img src="logo.png" alt="logo">
 <div class="logo-text">Matematiche non si nasce</div>
</div>


  <div id="abacus-container">
    <div id="rail">
      <div id="rail-line"></div>
      <div class="divider" id="divider"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" title="Tutte a sinistra" onclick="setLeft(20,true)">◀◀</button>
      <button class="ctrl-btn wide" onclick="setLeft(leftN+5,true)">+5</button>
      <button class="ctrl-btn" onclick="setLeft(leftN+1,true)">+1</button>
      <div class="sep"></div>
      <button class="ctrl-btn" onclick="setLeft(leftN-1,true)">−1</button>
      <button class="ctrl-btn wide" onclick="setLeft(leftN-5,true)">−5</button>
      <button class="ctrl-btn" title="Tutte a destra" onclick="setLeft(0,true)">▶▶</button>
    </div>
  </div>

</div>

<script>
const TOTAL = 20;
const COLORS = Array(5).fill('white').concat(Array(5).fill('red'))
                       .concat(Array(5).fill('white')).concat(Array(5).fill('red'));
const D = 22;

let railW = 0;
let leftN = 0;
let beadEls = [];

function init() {
  const rail = document.getElementById('rail');
  rail.querySelectorAll('.bead').forEach(b => b.remove());
  railW = rail.offsetWidth;
  beadEls = [];
  for (let i = 0; i < TOTAL; i++) {
    const el = document.createElement('div');
    el.className = 'bead ' + COLORS[i];
    el.dataset.idx = i;
    el.addEventListener('click', onBeadClick);
    rail.appendChild(el);
    beadEls.push(el);
  }
  leftN = 0;
  render(false);
  updateDivider();
}

// Bead i position:
// Left group (0..leftN-1): packed from left edge
// Right group (leftN..19): packed from right edge
function beadX(i) {
  if (i < leftN) return i * D;
  return railW - D - (TOTAL - 1 - i) * D;
}

function render(animate) {
  beadEls.forEach((el, i) => {
    el.style.transition = animate ? 'left 0.18s ease' : 'none';
    el.style.left = beadX(i) + 'px';
  });
}

function updateDivider() {
  railW = document.getElementById('rail').offsetWidth;
  document.getElementById('divider').style.left = (railW / 2 - 1) + 'px';
}

function setLeft(n, animate) {
  leftN = Math.max(0, Math.min(TOTAL, n));
  render(animate);
}

// Click on bead:
// If bead is on the LEFT side → send it + all beads to its RIGHT (within left group) to the right
//   i.e. set leftN = i (keep only beads 0..i-1 on left)
// If bead is on the RIGHT side → send it + all beads to its LEFT (within right group) to the left
//   i.e. set leftN = i+1 (move beads 0..i to left)
function onBeadClick(e) {
  const i = parseInt(e.currentTarget.dataset.idx);
  if (i < leftN) {
    // it's on the left: from this bead onward → send to right
    setLeft(i, true);
  } else {
    // it's on the right: this bead and all to its left in the right group → send to left
    setLeft(i + 1, true);
  }
}

window.addEventListener('load', init);
window.addEventListener('resize', () => {
  railW = document.getElementById('rail').offsetWidth;
  updateDivider(); render(false);
});
</script>
</body>
</html>
