<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f0e8;min-height:100vh;padding:16px}
h1{text-align:center;font-size:20px;font-weight:500;margin-bottom:12px;color:#333}
.setup{background:#fff;border-radius:12px;padding:16px;max-width:400px;margin:0 auto 16px;border:1px solid #ddd}
.setup label{font-size:14px;color:#555;display:block;margin-bottom:6px}
.setup input{width:100%;padding:8px;border:1px solid #ccc;border-radius:8px;font-size:14px;margin-bottom:10px}
.setup button,.action-btn{background:#4a7c59;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;width:100%}
.setup button:hover,.action-btn:hover{background:#3a6347}
.game{display:none;max-width:520px;margin:0 auto}
.boxes-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.player-box{flex:1;min-width:100px;background:#8B4513;border-radius:10px;padding:8px;border:2px solid #6b3410;opacity:0.5;transition:all .3s}
.player-box.active{opacity:1;border-color:#ffd700;box-shadow:0 0 0 2px #ffd700}
.player-box.done{opacity:0.3}
.box-label{color:#f5deb3;font-size:11px;text-align:center;margin-bottom:5px;font-weight:500}
.mini-nums{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.mini-tile{width:22px;height:26px;border-radius:4px;background:#f5deb3;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#333}
.mini-tile.closed{background:#6b3410;color:#6b3410}
.mini-score{color:#f5deb3;font-size:11px;text-align:center;margin-top:4px}
.main-board{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #ddd}
.turn-label{font-size:13px;color:#888;margin-bottom:8px;text-align:center}
.big-nums{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.num-tile{width:42px;height:52px;border-radius:6px;border:2px solid #6b3410;background:#f5deb3;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#333;cursor:pointer;transition:all .2s;user-select:none}
.num-tile.closed{background:#6b3410;color:#6b3410;cursor:default;border-color:#4a2510}
.num-tile.selected{background:#ffd700;border-color:#b8860b}
.num-tile.open:hover{background:#ffe0a0}
.dice-row{display:flex;gap:12px;justify-content:center;margin-bottom:10px}
.die{width:156px;height:156px;border-radius:20px;background:#fff;border:3px solid #333;display:flex;align-items:center;justify-content:center;font-size:100px;color:#333}
.sum-info{font-size:13px;color:#888;text-align:center;margin-bottom:6px;min-height:18px}
.msg{font-size:14px;color:#555;text-align:center;margin-bottom:10px;min-height:20px}
.msg.warn{color:#c0392b;font-weight:600}
.msg.ok{color:#27ae60;font-weight:600}
.score-input-area{background:#fff9e6;border-radius:10px;padding:12px;border:1px solid #f0d060;margin-bottom:10px}
.score-input-area p{font-size:14px;color:#555;margin-bottom:8px}
.score-input-area input{width:100%;padding:8px;border:1px solid #ccc;border-radius:8px;font-size:18px;text-align:center;margin-bottom:8px}
.btn-row{display:flex;gap:8px}
.action-btn{flex:1;padding:10px;font-size:14px}
.action-btn.secondary{background:#888}
.action-btn.secondary:hover{background:#666}
.action-btn:disabled{background:#ccc;cursor:default}
.final-results{background:#fff;border-radius:12px;padding:16px;border:1px solid #ddd;text-align:center;display:none;max-width:460px;margin:0 auto}
.final-results h2{font-size:20px;margin-bottom:12px}
.result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:15px}
.result-row:last-child{border-bottom:none}
.winner-badge{background:#4a7c59;color:#fff;border-radius:6px;padding:2px 8px;font-size:12px;margin-left:6px}
</style>
</head>
<body>
<h2 class="sr-only" style="position:absolute;left:-9999px">Chiudi la Scatola — gioco da tavolo digitale</h2>
<div style="text-align:center;margin-bottom:14px">
  <a href="https://matematichenonsinasce.com/" target="_blank" style="text-decoration:none;display:inline-flex;flex-direction:column;align-items:center;gap:6px">
    <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" style="width:60px;height:60px;object-fit:contain;border-radius:50%">
    <span style="font-size:15px;font-weight:500;color:#4a7c59;letter-spacing:0.3px">Matematiche non si nasce</span>
  </a>
</div>
<h1>Chiudi la Scatola</h1>

<div class="setup" id="setupPanel">
  <label>Numero di giocatori (2–4)</label>
  <input type="number" id="numPlayers" min="2" max="4" value="2">
  <div id="playerNames"></div>
  <button onclick="startGame()">Inizia la partita</button>
</div>

<div class="game" id="gamePanel">
  <div class="boxes-row" id="boxesRow"></div>

  <div class="main-board">
    <div class="turn-label" id="turnLabel"></div>
    <div class="big-nums" id="bigNums"></div>
    <div class="dice-row">
      <div class="die" id="d1">-</div>
      <div class="die" id="d2">-</div>
    </div>
    <div class="sum-info" id="sumInfo"></div>
    <div class="msg" id="msg"></div>
    <div class="score-input-area" id="scoreInputArea" style="display:none">
      <p id="scorePrompt"></p>
      <input type="number" id="scoreInput" min="0" placeholder="Inserisci il punteggio">
      <button class="action-btn" onclick="checkScore()">Conferma</button>
    </div>
    <div class="btn-row">
      <button class="action-btn" id="btnRoll" onclick="rollDice()">Lancia i dadi</button>
      <button class="action-btn secondary" id="btnConfirm" onclick="confirmSelection()" style="display:none">Conferma scelta</button>
      <div id="btnChoiceDice" style="display:none;gap:8px;width:100%">
        <button class="action-btn" onclick="doRoll(1)" style="background:#4a7c59">1 dado</button>
        <button class="action-btn" onclick="doRoll(2)" style="background:#4a7c59">2 dadi</button>
      </div>
    </div>
  </div>
</div>

<div class="final-results" id="finalResults">
  <h2>Risultati finali</h2>
  <div id="resultsList"></div>
  <button class="action-btn" style="margin-top:16px" onclick="location.reload()">Nuova partita</button>
</div>

<script>
const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
let players=[], states=[], active=[], currentIdx=0, rolled=false, selected=[], diceSum=0, diceVals=[];

document.getElementById('numPlayers').addEventListener('input', buildNameInputs);
buildNameInputs();

function buildNameInputs(){
  const n=parseInt(document.getElementById('numPlayers').value)||2;
  const cont=document.getElementById('playerNames');
  cont.innerHTML='';
  for(let i=0;i<n;i++){
    const inp=document.createElement('input');
    inp.placeholder=`Nome giocatore ${i+1}`;
    inp.id=`pname${i}`;
    inp.style.marginBottom='8px';
    cont.appendChild(inp);
  }
}

function startGame(){
  const n=parseInt(document.getElementById('numPlayers').value)||2;
  players=[];
  for(let i=0;i<n;i++){
    const v=document.getElementById(`pname${i}`).value.trim();
    players.push(v||`Giocatore ${i+1}`);
  }
  states=players.map(()=>({closed:[],score:null,done:false,won:false}));
  active=players.map((_,i)=>i);
  currentIdx=0;
  document.getElementById('setupPanel').style.display='none';
  document.getElementById('gamePanel').style.display='block';
  initTurn();
}

function currentPlayer(){ return active[currentIdx]; }

function initTurn(){
  rolled=false; selected=[]; diceSum=0; diceVals=[];
  renderMiniBoxes();
  renderBigNums();
  document.getElementById('d1').textContent='-';
  document.getElementById('d2').textContent='-';
  document.getElementById('sumInfo').textContent='';
  document.getElementById('scoreInputArea').style.display='none';
  document.getElementById('btnConfirm').style.display='none';
  document.getElementById('btnRoll').disabled=false;
  const p=currentPlayer();
  document.getElementById('turnLabel').textContent=`Turno di ${players[p]}`;
  setMsg('Lancia i dadi!','');
}

function renderMiniBoxes(){
  const cont=document.getElementById('boxesRow');
  cont.innerHTML='';
  players.forEach((name,i)=>{
    const st=states[i];
    const div=document.createElement('div');
    const isActive=active.includes(i)&&active[currentIdx]===i;
    div.className='player-box'+(isActive?' active':st.done?' done':'');
    let numsHtml='';
    for(let n=1;n<=9;n++){
      numsHtml+=`<div class="mini-tile${st.closed.includes(n)?' closed':''}">${st.closed.includes(n)?'':n}</div>`;
    }
    const scoreStr=st.score!==null?`${st.score} pt`:(st.won?'0 pt':'');
    div.innerHTML=`<div class="box-label">${name}</div><div class="mini-nums">${numsHtml}</div><div class="mini-score">${scoreStr}</div>`;
    cont.appendChild(div);
  });
}

function renderBigNums(){
  const p=currentPlayer();
  const st=states[p];
  const cont=document.getElementById('bigNums');
  cont.innerHTML='';
  for(let n=1;n<=9;n++){
    const div=document.createElement('div');
    const isClosed=st.closed.includes(n);
    const isSel=selected.includes(n);
    div.className='num-tile'+(isClosed?' closed':isSel?' selected':' open');
    div.textContent=isClosed?'':n;
    if(!isClosed) div.onclick=()=>toggleSelect(n);
    cont.appendChild(div);
  }
}

function canUseSingleDie(){
  const st=states[currentPlayer()];
  return [7,8,9].every(n=>st.closed.includes(n));
}

function rollDice(){
  if(rolled) return;
  if(canUseSingleDie()){
    setMsg('Quanti dadi vuoi lanciare?','');
    document.getElementById('btnRoll').style.display='none';
    document.getElementById('btnChoiceDice').style.display='flex';
    return;
  }
  doRoll(2);
}

function doRoll(numDice){
  document.getElementById('btnRoll').style.display='block';
  document.getElementById('btnChoiceDice').style.display='none';
  const v1=Math.ceil(Math.random()*6);
  const v2=numDice===2?Math.ceil(Math.random()*6):null;
  diceVals=v2?[v1,v2]:[v1];
  diceSum=diceVals.reduce((a,b)=>a+b,0);
  document.getElementById('d1').textContent=faces[v1-1];
  document.getElementById('d2').textContent=v2?faces[v2-1]:'-';
  document.getElementById('sumInfo').textContent='';
  rolled=true; selected=[];
  renderBigNums();
  if(!hasMoves()){
    noMoreMoves();
  } else {
    setMsg('Seleziona i numeri da chiudere, poi conferma.','');
    document.getElementById('btnRoll').disabled=true;
    document.getElementById('btnConfirm').style.display='inline-block';
  }
}

function toggleSelect(n){
  if(!rolled) return;
  if(states[currentPlayer()].closed.includes(n)) return;
  const idx=selected.indexOf(n);
  if(idx>=0) selected.splice(idx,1); else selected.push(n);
  renderBigNums();
}

function confirmSelection(){
  if(selected.length===0){ setMsg('Seleziona almeno un numero!','warn'); return; }
  const s=selected.reduce((a,b)=>a+b,0);
  if(s!==diceSum){ setMsg(`La somma dei numeri scelti (${s}) non corrisponde a ${diceSum}. Riprova.`,'warn'); return; }
  const st=states[currentPlayer()];
  selected.forEach(n=>st.closed.push(n));
  selected=[];
  document.getElementById('btnConfirm').style.display='none';
  if(st.closed.length===9){
    st.done=true; st.won=true; st.score=0;
    renderMiniBoxes();
    setMsg('Esatto! Hai chiuso la scatola!','ok');
    document.getElementById('btnRoll').disabled=true;
    removeFromActive(currentPlayer());
    setTimeout(()=>{ if(active.length===0){ showFinalResults(); } else { advanceTurn(); initTurn(); } },1800);
  } else {
    rolled=false;
    renderBigNums();
    document.getElementById('sumInfo').textContent='';
    document.getElementById('d1').textContent='-';
    document.getElementById('d2').textContent='-';
    advanceTurn();
    initTurn();
  }
}

function hasMoves(){
  const st=states[currentPlayer()];
  const open=[1,2,3,4,5,6,7,8,9].filter(n=>!st.closed.includes(n));
  return findCombinations(open,diceSum).length>0;
}

function findCombinations(nums,target){
  const res=[];
  function bt(i,curr,sum){
    if(sum===target){res.push([...curr]);return;}
    if(sum>target||i>=nums.length) return;
    curr.push(nums[i]); bt(i+1,curr,sum+nums[i]); curr.pop();
    bt(i+1,curr,sum);
  }
  bt(0,[],0);
  return res;
}

function noMoreMoves(){
  const st=states[currentPlayer()];
  const open=[1,2,3,4,5,6,7,8,9].filter(n=>!st.closed.includes(n));
  const real=open.reduce((a,b)=>a+b,0);
  document.getElementById('btnRoll').disabled=true;
  document.getElementById('btnConfirm').style.display='none';
  document.getElementById('scoreInputArea').style.display='block';
  document.getElementById('scorePrompt').textContent=`Attenzione! Non hai più mosse disponibili. I numeri rimasti sono: ${open.join(' + ')}. Calcola il punteggio e inseriscilo!`;
  document.getElementById('scoreInput').value='';
  document.getElementById('scoreInput').dataset.real=real;
  setMsg('','');
}

function checkScore(){
  const input=parseInt(document.getElementById('scoreInput').value);
  const real=parseInt(document.getElementById('scoreInput').dataset.real);
  if(isNaN(input)){setMsg('Inserisci un numero!','warn');return;}
  if(input===real){
    const p=currentPlayer();
    states[p].done=true; states[p].score=real;
    setMsg(`Esatto! Punteggio: ${real}.`,'ok');
    document.getElementById('scoreInputArea').style.display='none';
    renderMiniBoxes();
    removeFromActive(p);
    setTimeout(()=>{ if(active.length===0){ showFinalResults(); } else { advanceTurn(); initTurn(); } },1500);
  } else {
    setMsg('Non è corretto. Riprova!','warn');
    document.getElementById('scoreInput').value='';
  }
}

function removeFromActive(p){
  const i=active.indexOf(p);
  if(i>=0) active.splice(i,1);
  if(currentIdx>=active.length) currentIdx=0;
}

function advanceTurn(){
  if(active.length===0) return;
  currentIdx=(currentIdx+1)%active.length;
}

function showFinalResults(){
  document.getElementById('gamePanel').style.display='none';
  document.getElementById('finalResults').style.display='block';
  const sorted=players.map((name,i)=>({name,score:states[i].score??0})).sort((a,b)=>a.score-b.score);
  const minScore=sorted[0].score;
  const list=document.getElementById('resultsList');
  list.innerHTML='';
  sorted.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='result-row';
    row.style.background=p.score===minScore?'#e8f5e9':''
    row.style.borderRadius=p.score===minScore?'8px':''
    row.style.padding=p.score===minScore?'8px 10px':'8px 0'
    row.innerHTML=`<span>${i+1}. ${p.name}</span><span>${p.score} punti</span>`;
    list.appendChild(row);
  });
}

function setMsg(text,type){
  const el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg'+(type?' '+type:'');
}
</script>
</body>
</html>
