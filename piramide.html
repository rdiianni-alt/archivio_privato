<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piramide dei Numeri</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .logo img {
    width: 60px; height: 60px;
    object-fit: contain;
    border-radius: 50%;
  }

  .site-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: #2c3e7a;
    line-height: 1.2;
  }

  h1 {
    font-size: 1.5rem;
    color: #2c3e7a;
    margin-bottom: 12px;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 18px;
  }

  .controls label {
    font-size: 0.85rem;
    color: #444;
    font-weight: 600;
  }

  select, button {
    padding: 8px 14px;
    border-radius: 8px;
    border: 2px solid #2c3e7a;
    font-size: 0.95rem;
    cursor: pointer;
  }

  select { background: white; color: #2c3e7a; font-weight: 600; }

  button {
    background: #2c3e7a;
    color: white;
    font-weight: 700;
    border: none;
    transition: background 0.2s;
  }
  button:hover { background: #1a2a5e; }

  .pyramid-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 24px;
  }

  .row {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .brick {
    width: 64px; height: 48px;
    border: 2.5px solid #2c3e7a;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    background: #fff;
    color: #2c3e7a;
    position: relative;
  }

  .brick.given {
    background: #dce8ff;
  }

  .brick input {
    width: 100%; height: 100%;
    border: none;
    outline: none;
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: #333;
    background: transparent;
    border-radius: 4px;
  }

  .brick.correct { background: #c8f7c5; border-color: #2e9e35; }
  .brick.wrong   { background: #ffd6d6; border-color: #c0392b; }

  .result-box {
    background: white;
    border: 2px solid #2c3e7a;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 1.1rem;
    font-weight: 700;
    color: #2c3e7a;
    text-align: center;
    margin-bottom: 14px;
    display: none;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-check { background: #27ae60; }
  .btn-check:hover { background: #1e8449; }
  .btn-new { background: #e67e22; }
  .btn-new:hover { background: #ca6f1e; }
</style>
</head>
<body>

<header>
  <div class="logo">
  <a href="https://matematicaconlemani.wordpress.com/" target="_blank">
    <img src="logo.png" alt="logo">
  </a>
  </div>
  <div class="site-title">Matematiche<br>non si nasce</div>
</header>

<h1>🧱 Piramide dei Numeri</h1>

<div class="controls">
  <div>
    <label>Difficoltà: </label>
    <select id="mode">
      <option value="small">🟢 Piccoli (≤ 20)</option>
      <option value="big">🟡 Grandi (≤ 100)</option>
      <option value="decimal">🔴 Decimali (≤ 100)</option>
    </select>
  </div>
  <button class="btn-new" onclick="newGame()">🔀 Nuova piramide</button>
</div>

<div class="pyramid-wrap" id="pyramid"></div>

<div class="result-box" id="resultBox"></div>

<div class="btn-row">
  <button class="btn-check" onclick="checkAnswers()">✅ Verifica</button>
  <button class="btn-new" onclick="newGame()">🔄 Ricomincia</button>
</div>

<script>
  // pyramid: 4 levels. row0=base(4 bricks), row1=3, row2=2, row3=1(top)
  // values[row][col]
  let values = [];
  let hidden = []; // hidden[row][col] = true/false

  function round2(n) { return Math.round(n * 100) / 100; }

  function newGame() {
    const mode = document.getElementById('mode').value;
    document.getElementById('resultBox').style.display = 'none';

    // Generate base row
    let base = [];
    if (mode === 'small') {
      // base values 0-9, total top ≤ 20
      for (let i = 0; i < 4; i++) base.push(Math.floor(Math.random() * 6));
    } else if (mode === 'big') {
      for (let i = 0; i < 4; i++) base.push(Math.floor(Math.random() * 15));
    } else {
      // decimal: 1 decimal place
      for (let i = 0; i < 4; i++) base.push(Math.round(Math.random() * 100) / 10);
    }

    // Build all levels
    values = [base];
    for (let r = 1; r <= 3; r++) {
      let prev = values[r-1];
      let row = [];
      for (let c = 0; c < prev.length - 1; c++) {
        row.push(round2(prev[c] + prev[c+1]));
      }
      values.push(row);
    }

    // Choose ~half bricks to hide
    // total bricks: 4+3+2+1 = 10, hide 5
    let allBricks = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < values[r].length; c++)
        allBricks.push([r,c]);

    // Shuffle and pick 5
    allBricks.sort(() => Math.random() - 0.5);
    let toHide = allBricks.slice(0, 5);

    hidden = values.map(row => row.map(() => false));
    toHide.forEach(([r,c]) => hidden[r][c] = true);

    renderPyramid();
  }

  function renderPyramid() {
    const wrap = document.getElementById('pyramid');
    wrap.innerHTML = '';

    // Render top to bottom (row 3 = top)
    for (let r = 3; r >= 0; r--) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'row';
      for (let c = 0; c < values[r].length; c++) {
        const brick = document.createElement('div');
        brick.className = 'brick' + (hidden[r][c] ? '' : ' given');
        brick.dataset.r = r;
        brick.dataset.c = c;

        if (hidden[r][c]) {
          const inp = document.createElement('input');
          inp.type = 'number';
          inp.step = 'any';
          inp.placeholder = '?';
          inp.id = `inp_${r}_${c}`;
          inp.addEventListener('keydown', e => { if(e.key==='Enter') checkAnswers(); });
          brick.appendChild(inp);
        } else {
          brick.textContent = values[r][c];
        }
        rowDiv.appendChild(brick);
      }
      wrap.appendChild(rowDiv);
    }
  }

  function checkAnswers() {
    let correct = 0, total = 0;
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < values[r].length; c++) {
        if (!hidden[r][c]) continue;
        total++;
        const inp = document.getElementById(`inp_${r}_${c}`);
        const brick = inp.parentElement;
        const userVal = parseFloat(inp.value.replace(',','.'));
        const correctVal = values[r][c];
        brick.classList.remove('correct','wrong');
        if (!isNaN(userVal) && Math.abs(userVal - correctVal) < 0.01) {
          brick.classList.add('correct');
          correct++;
        } else {
          brick.classList.add('wrong');
        }
      }
    }
    const box = document.getElementById('resultBox');
    box.style.display = 'block';
    if (correct === total) {
      box.textContent = `🎉 Perfetto! Hai indovinato tutti i ${total} mattoni!`;
      box.style.color = '#1e8449';
    } else {
      box.textContent = `Hai trovato ${correct} su ${total} mattoni corretti. Riprova!`;
      box.style.color = '#c0392b';
    }
  }

  newGame();
</script>
</body>
</html>
