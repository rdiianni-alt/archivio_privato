<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabelline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .logo { margin-bottom: 12px; }
  .header { text-align: center; margin-bottom: 20px; }
  .logo img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; display: block; margin: 0 auto 6px; }
  .blog-name { color: white; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 6px; opacity: 0.9; }
  h1 { color: white; font-size: 1.8rem; margin-bottom: 20px; text-align: center; }
  .card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
  }

  /* SETUP */
  #setup h2 { color: #555; margin-bottom: 16px; font-size: 1rem; }
  .tabelline-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .tb-btn {
    padding: 10px 0;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #f9f9f9;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all .2s;
    color: #444;
  }
  .tb-btn.sel {
    background: #667eea;
    border-color: #667eea;
    color: white;
  }
  .start-btn {
    background: #667eea;
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 12px;
    font-size: 1.1rem;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
    transition: background .2s;
  }
  .start-btn:hover { background: #5a6fd6; }
  .start-btn:disabled { background: #ccc; cursor: default; }

  /* GAME */
  #game { display: none; }
  .score-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    font-size: 0.85rem;
    color: #888;
  }
  .score-bar span { font-weight: bold; color: #555; }
  .question-box {
    background: #f0f0ff;
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .question-box p { font-size: 0.9rem; color: #888; margin-bottom: 6px; }
  .question-text {
    font-size: 2.2rem;
    font-weight: bold;
    color: #333;
  }
  .answer-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .answer-row input {
    flex: 1;
    padding: 14px;
    font-size: 1.3rem;
    border: 2px solid #ddd;
    border-radius: 12px;
    text-align: center;
    outline: none;
    transition: border .2s;
  }
  .answer-row input:focus { border-color: #667eea; }
  .answer-row input.correct { border-color: #4caf50; background: #e8f5e9; }
  .answer-row input.wrong { border-color: #f44336; background: #fdecea; }
  .check-btn {
    padding: 14px 20px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: bold;
    transition: background .2s;
  }
  .check-btn:hover { background: #5a6fd6; }
  .feedback {
    font-size: 1rem;
    font-weight: bold;
    min-height: 24px;
    margin-bottom: 10px;
  }
  .feedback.ok { color: #4caf50; }
  .feedback.no { color: #f44336; }
  .next-btn {
    background: #4caf50;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 12px;
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
    display: none;
    transition: background .2s;
  }
  .next-btn:hover { background: #43a047; }
  .restart-btn {
    margin-top: 10px;
    background: none;
    border: 2px solid #ccc;
    color: #888;
    padding: 10px;
    border-radius: 10px;
    width: 100%;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all .2s;
  }
  .restart-btn:hover { border-color: #667eea; color: #667eea; }

  /* RESULT */
  #result { display: none; }
  #result h2 { font-size: 1.6rem; color: #333; margin-bottom: 10px; }
  .final-score { font-size: 3rem; font-weight: bold; color: #667eea; margin: 16px 0; }
  #result p { color: #777; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="header">
  <a href="https://matematicaconlemani.wordpress.com/" target="_blank" class="logo">
    <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="logo">
  </a>
  <div class="blog-name">Matematica con le mani</div>
  <h1>🔢 Tabelline</h1>
</div>

<div class="card">

  <!-- SETUP -->
  <div id="setup">
    <h2>Seleziona le tabelline da ripassare:</h2>
    <div class="tabelline-grid" id="tabellineGrid"></div>
    <button class="start-btn" id="startBtn" disabled onclick="startGame()">Inizia il gioco!</button>
  </div>

  <!-- GAME -->
  <div id="game">
    <div class="score-bar">
      <div>Domanda <span id="qNum">1</span> / <span id="qTot">10</span></div>
      <div>✅ <span id="correct">0</span> &nbsp; ❌ <span id="wrong">0</span></div>
    </div>
    <div class="question-box">
      <p id="questionType"></p>
      <div class="question-text" id="questionText"></div>
    </div>
    <div class="answer-row">
      <input type="number" id="answerInput" placeholder="?" onkeydown="handleKey(event)">
      <button class="check-btn" onclick="checkAnswer()">OK</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Prossima →</button>
    <button class="restart-btn" onclick="goSetup()">↩ Cambia tabelline</button>
  </div>

  <!-- RESULT -->
  <div id="result">
    <h2 id="resultEmoji">🎉 Bravo!</h2>
    <div class="final-score" id="finalScore"></div>
    <p id="resultMsg"></p>
    <button class="start-btn" onclick="startGame()">🔄 Rigioca</button>
    <button class="restart-btn" onclick="goSetup()">↩ Cambia tabelline</button>
  </div>

</div>

<script>
const selected = new Set();
let questions = [], qIndex = 0, correctCount = 0, wrongCount = 0;

// Build tabellina buttons 2-10
const grid = document.getElementById('tabellineGrid');
for (let i = 2; i <= 10; i++) {
  const b = document.createElement('button');
  b.className = 'tb-btn';
  b.textContent = i;
  b.onclick = () => {
    if (selected.has(i)) { selected.delete(i); b.classList.remove('sel'); }
    else { selected.add(i); b.classList.add('sel'); }
    document.getElementById('startBtn').disabled = selected.size === 0;
  };
  grid.appendChild(b);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  questions = [];
  selected.forEach(t => {
    for (let m = 1; m <= 10; m++) {
      // Randomly show result-missing or factor-missing
      const type = Math.random() < 0.5 ? 'result' : 'factor';
      questions.push({ t, m, type });
    }
  });
  shuffle(questions);
  qIndex = 0; correctCount = 0; wrongCount = 0;
  show('game');
  loadQuestion();
}

function loadQuestion() {
  const q = questions[qIndex];
  document.getElementById('qNum').textContent = qIndex + 1;
  document.getElementById('qTot').textContent = questions.length;
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';
  const inp = document.getElementById('answerInput');
  inp.value = '';
  inp.className = '';
  inp.disabled = false;

  if (q.type === 'result') {
    document.getElementById('questionType').textContent = 'Quanto fa?';
    document.getElementById('questionText').textContent = `${q.t} × ${q.m} = ?`;
  } else {
    document.getElementById('questionType').textContent = 'Quale numero manca?';
    document.getElementById('questionText').textContent = `${q.t} × ? = ${q.t * q.m}`;
  }
  inp.focus();
}

function checkAnswer() {
  const q = questions[qIndex];
  const inp = document.getElementById('answerInput');
  const val = parseInt(inp.value);
  if (isNaN(val)) return;
  const correct = q.type === 'result' ? q.t * q.m : q.m;
  const fb = document.getElementById('feedback');
  inp.disabled = true;
  if (val === correct) {
    inp.className = 'correct';
    fb.textContent = '✅ Esatto!';
    fb.className = 'feedback ok';
    correctCount++;
  } else {
    inp.className = 'wrong';
    fb.textContent = `❌ No! La risposta è ${correct}`;
    fb.className = 'feedback no';
    wrongCount++;
  }
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;
  document.getElementById('nextBtn').style.display = 'block';
  if (qIndex === questions.length - 1) {
    document.getElementById('nextBtn').textContent = 'Vedi risultato 🏆';
  }
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= questions.length) { showResult(); return; }
  loadQuestion();
}

function showResult() {
  show('result');
  const tot = questions.length;
  document.getElementById('finalScore').textContent = `${correctCount} / ${tot}`;
  const pct = correctCount / tot;
  let emoji = '😢', msg = 'Riprova ancora, ce la puoi fare!';
  if (pct === 1) { emoji = '🏆'; msg = 'Perfetto! Hai risposto giusto a tutto!'; }
  else if (pct >= 0.8) { emoji = '🎉'; msg = 'Ottimo risultato! Quasi perfetto!'; }
  else if (pct >= 0.6) { emoji = '😊'; msg = 'Bene! Ancora un po\' di pratica e ci sei!'; }
  else if (pct >= 0.4) { emoji = '🙂'; msg = 'Non male, ma puoi migliorare!'; }
  document.getElementById('resultEmoji').textContent = emoji + ' Risultato';
  document.getElementById('resultMsg').textContent = msg;
}

function goSetup() { show('setup'); }

function show(id) {
  ['setup','game','result'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function handleKey(e) { if (e.key === 'Enter') checkAnswer(); }
</script>
</body>
</html>
