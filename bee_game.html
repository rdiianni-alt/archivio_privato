<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Ape e il Fiore</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #e8f5e9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; }
  h1 { color: #f57f17; font-size: 1.6em; margin: 8px 0 4px; text-shadow: 1px 1px 2px #fff; }
  #subtitle { color: #558b2f; font-size: 0.95em; margin-bottom: 8px; }

  #main { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

  /* GRID */
  #grid-wrap { position: relative; }
  #grid { display: grid; grid-template-columns: repeat(15, 34px); grid-template-rows: repeat(15, 34px); gap: 1px; background: #aed581; border: 3px solid #7cb342; border-radius: 6px; }
  .cell { width: 34px; height: 34px; background: #f9fbe7; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: background 0.2s; }
  .cell.obstacle { background: #a5d6a7; }
  .cell.bee { background: #fff9c4; }
  .cell.flower { background: #fce4ec; }
  .cell.trail { background: #e8f5e9; }
  .cell.boom { background: #ffcdd2 !important; }
  .cell.win-cell { background: #fff176 !important; }

  /* PANEL */
  #panel { display: flex; flex-direction: column; gap: 10px; min-width: 220px; max-width: 260px; }

  #commands-box { background: #fff; border: 2px solid #aed581; border-radius: 10px; padding: 10px; }
  #commands-box h3 { color: #558b2f; font-size: 0.95em; margin-bottom: 6px; }
  #commands-list { display: flex; flex-wrap: wrap; gap: 4px; min-height: 40px; }
  .cmd-arrow { font-size: 18px; background: #f3e5f5; border-radius: 6px; padding: 2px 6px; cursor: pointer; border: 1px solid #ce93d8; transition: transform 0.1s; }
  .cmd-arrow:hover { transform: scale(1.15); background: #e1bee7; }
  .cmd-arrow.active-step { background: #ffcc02; border-color: #f57f17; transform: scale(1.2); }
  #cmd-count { font-size: 0.8em; color: #888; margin-top: 4px; }

  /* Arrow pad */
  #arrow-pad { background: #fff; border: 2px solid #aed581; border-radius: 10px; padding: 10px; }
  #arrow-pad h3 { color: #558b2f; font-size: 0.95em; margin-bottom: 8px; }
  .pad-grid { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 4px; }
  .pad-btn { width: 52px; height: 52px; font-size: 26px; border: none; border-radius: 10px; background: #7cb342; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #558b2f; transition: transform 0.1s, box-shadow 0.1s; user-select: none; }
  .pad-btn:active, .pad-btn.pressed { transform: translateY(2px); box-shadow: 0 1px 0 #558b2f; }
  .pad-btn.empty { background: transparent; box-shadow: none; cursor: default; }
  .pad-btn.del-btn { background: #ef9a9a; box-shadow: 0 3px 0 #e57373; font-size: 18px; }
  .pad-btn.del-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #e57373; }

  /* Buttons */
  #btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn { flex: 1; padding: 10px 0; font-size: 1em; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  .action-btn:disabled { opacity: 0.4; cursor: default; }
  #btn-start { background: #ffcc02; color: #5d4037; box-shadow: 0 3px 0 #f9a825; }
  #btn-start:not(:disabled):active { transform: translateY(2px); box-shadow: 0 1px 0 #f9a825; }
  #btn-reset { background: #ef9a9a; color: #5d4037; box-shadow: 0 3px 0 #e57373; }
  #btn-reset:active { transform: translateY(2px); box-shadow: 0 1px 0 #e57373; }

  /* Message */
  #message { text-align: center; font-size: 1.1em; font-weight: bold; min-height: 28px; color: #333; }
  #message.win { color: #2e7d32; }
  #message.lose { color: #c62828; }

  /* Speed */
  #speed-row { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: #555; }
  #speed-row input { flex: 1; accent-color: #7cb342; }
</style>
</head>
<body>
<div class="logo" style="text-align:center; margin-bottom: 6px;">
  <a href="https://matematichenonsinasce.com/" target="_blank" style="text-decoration:none; display:inline-flex; flex-direction:column; align-items:center; gap:6px;">
    <img src="https://raw.githubusercontent.com/rdiianni-alt/quiz-matematica-prima/fca31cdfe65286a5abbf269e23429e4ddc479c78/logo.png" alt="Logo Matematiche non si nasce" style="width:60px;height:60px;object-fit:contain;border-radius:50%;">
    <span style="font-size:1em; font-weight:bold; color:#558b2f; letter-spacing:0.5px;">Matematiche non si nasce</span>
  </a>
</div>
<h1>🐝 L'Ape e il Fiore 🌸</h1>
<p id="subtitle">Scrivi i comandi e fai volare l'ape fino al fiore!</p>

<div id="main">
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <div id="panel">
    <div id="commands-box">
      <h3>📋 Comandi inseriti:</h3>
      <div id="commands-list"></div>
      <div id="cmd-count">0 / 20 mosse</div>
    </div>

    <div id="arrow-pad">
      <h3>🎮 Inserisci frecce:</h3>
      <div class="pad-grid">
        <div class="pad-btn empty"></div>
        <button class="pad-btn" id="btn-up">⬆️</button>
        <div class="pad-btn empty"></div>
        <button class="pad-btn" id="btn-left">⬅️</button>
        <button class="pad-btn del-btn" id="btn-del">⌫</button>
        <button class="pad-btn" id="btn-right">➡️</button>
        <div class="pad-btn empty"></div>
        <button class="pad-btn" id="btn-down">⬇️</button>
        <div class="pad-btn empty"></div>
      </div>
    </div>

    <div id="speed-row">
      🐢 <input type="range" id="speed" min="1" max="5" value="3"> 🐇
      <span id="speed-label">Velocità: 3</span>
    </div>

    <div id="btns">
      <button class="action-btn" id="btn-start">▶ START</button>
      <button class="action-btn" id="btn-reset">🔄 Reset</button>
    </div>

    <div id="message"></div>
  </div>
</div>

<script>
const COLS = 15, ROWS = 15;
const MAX_MOVES = 20;
const START = {r: 0, c: 0};
const OBSTACLE_COUNT = 22;

let grid = [], flowerPos = {}, commands = [], beePos = {}, running = false, stepTimeout = null;

function initGame() {
  clearTimeout(stepTimeout);
  running = false;
  commands = [];
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0)); // 0=empty, 1=obstacle

  // Place obstacles (avoid start area and surroundings)
  let placed = 0;
  while (placed < OBSTACLE_COUNT) {
    let r = Math.floor(Math.random() * ROWS);
    let c = Math.floor(Math.random() * COLS);
    if ((r < 3 && c < 3)) continue; // protect start corner
    if (grid[r][c] === 0) { grid[r][c] = 1; placed++; }
  }

  // Place flower (reachable cell, not start, not obstacle)
  let fx, fy;
  do {
    fx = Math.floor(Math.random() * ROWS);
    fy = Math.floor(Math.random() * COLS);
  } while ((fx === START.r && fy === START.c) || grid[fx][fy] === 1 || (fx < 2 && fy < 2));
  flowerPos = {r: fx, c: fy};

  beePos = {...START};
  renderGrid();
  renderCommands();
  setMessage('', '');
  setInputEnabled(true);
  document.getElementById('btn-start').disabled = false;
}

function renderGrid(highlightBee, boom, winCell) {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (boom && boom.r === r && boom.c === c) { cell.classList.add('boom'); cell.textContent = '💥'; }
      else if (winCell && flowerPos.r === r && flowerPos.c === c) { cell.classList.add('win-cell'); cell.textContent = '🎉'; }
      else if (beePos.r === r && beePos.c === c && highlightBee !== false) { cell.classList.add('bee'); cell.textContent = '🐝'; }
      else if (flowerPos.r === r && flowerPos.c === c) { cell.classList.add('flower'); cell.textContent = '🌸'; }
      else if (grid[r][c] === 1) { cell.classList.add('obstacle'); cell.textContent = '🌿'; }
      gridEl.appendChild(cell);
    }
  }
}

function renderCommands(activeIdx) {
  const list = document.getElementById('commands-list');
  const count = document.getElementById('cmd-count');
  list.innerHTML = '';
  commands.forEach((cmd, i) => {
    const span = document.createElement('span');
    span.className = 'cmd-arrow' + (i === activeIdx ? ' active-step' : '');
    span.textContent = cmd;
    span.title = 'Clicca per rimuovere';
    if (!running) span.addEventListener('click', () => { commands.splice(i, 1); renderCommands(); });
    list.appendChild(span);
  });
  count.textContent = `${commands.length} / ${MAX_MOVES} mosse`;
}

const dirMap = {'⬆️': {dr:-1,dc:0}, '⬇️': {dr:1,dc:0}, '⬅️': {dr:0,dc:-1}, '➡️': {dr:0,dc:1}};

function addCommand(arrow) {
  if (running || commands.length >= MAX_MOVES) return;
  commands.push(arrow);
  renderCommands();
}

function setInputEnabled(en) {
  ['btn-up','btn-down','btn-left','btn-right','btn-del'].forEach(id => document.getElementById(id).disabled = !en);
}

function setMessage(msg, type) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.className = type;
}

function getSpeed() {
  const v = parseInt(document.getElementById('speed').value);
  return [700, 500, 350, 200, 100][v-1];
}

function startExecution() {
  if (running || commands.length === 0) return;
  running = true;
  setInputEnabled(false);
  document.getElementById('btn-start').disabled = true;
  beePos = {...START};
  renderGrid();
  let step = 0;

  function doStep() {
    if (step >= commands.length) {
      // Finished all commands
      running = false;
      if (beePos.r === flowerPos.r && beePos.c === flowerPos.c) {
        renderGrid(true, null, true);
        setMessage('🎉 Esatto! Hai trovato il fiore!', 'win');
      } else {
        setMessage('😅 L\'ape non ha trovato il fiore. Riprova!', 'lose');
      }
      renderCommands();
      document.getElementById('btn-start').disabled = false;
      return;
    }

    renderCommands(step);
    const cmd = commands[step];
    const {dr, dc} = dirMap[cmd];
    const nr = beePos.r + dr, nc = beePos.c + dc;

    // Out of bounds
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) {
      running = false;
      renderGrid(false, beePos);
      setMessage('💥 L\'ape ha colpito il bordo! Riprova!', 'lose');
      renderCommands();
      document.getElementById('btn-start').disabled = false;
      return;
    }
    // Obstacle
    if (grid[nr][nc] === 1) {
      running = false;
      renderGrid(false, {r: nr, c: nc});
      setMessage('💥 L\'ape ha colpito un ostacolo! Riprova!', 'lose');
      renderCommands();
      document.getElementById('btn-start').disabled = false;
      return;
    }

    beePos = {r: nr, c: nc};
    renderGrid();

    // Reached flower?
    if (beePos.r === flowerPos.r && beePos.c === flowerPos.c) {
      running = false;
      renderGrid(true, null, true);
      setMessage('🎉 Esatto! Hai trovato il fiore!', 'win');      renderCommands();
      document.getElementById('btn-start').disabled = false;
      return;
    }

    step++;
    stepTimeout = setTimeout(doStep, getSpeed());
  }

  stepTimeout = setTimeout(doStep, 300);
}

// Events
document.getElementById('btn-up').addEventListener('click', () => addCommand('⬆️'));
document.getElementById('btn-down').addEventListener('click', () => addCommand('⬇️'));
document.getElementById('btn-left').addEventListener('click', () => addCommand('⬅️'));
document.getElementById('btn-right').addEventListener('click', () => addCommand('➡️'));
document.getElementById('btn-del').addEventListener('click', () => { if (!running) { commands.pop(); renderCommands(); } });
document.getElementById('btn-start').addEventListener('click', startExecution);
document.getElementById('btn-reset').addEventListener('click', initGame);

document.getElementById('speed').addEventListener('input', function() {
  document.getElementById('speed-label').textContent = 'Velocità: ' + this.value;
});

// Keyboard support
document.addEventListener('keydown', e => {
  if (running) return;
  if (e.key === 'ArrowUp') { addCommand('⬆️'); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { addCommand('⬇️'); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { addCommand('⬅️'); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { addCommand('➡️'); e.preventDefault(); }
  else if (e.key === 'Backspace') { commands.pop(); renderCommands(); }
  else if (e.key === 'Enter') startExecution();
});

initGame();
</script>
</body>
</html>
