<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traduci per Brioshi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; }

  header {
    background: #fff;
    border-bottom: 2px solid #e0e0e0;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    cursor: pointer;
  }
  .logo-area img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    border-radius: 50%;
  }
  .blog-name {
    font-size: 13px;
    color: #555;
    font-style: italic;
    max-width: 140px;
    line-height: 1.3;
  }
  .title-center {
    text-align: center;
    flex: 1;
  }
  .title-center h1 {
    font-size: 26px;
    color: #c0392b;
    font-weight: 800;
    letter-spacing: 1px;
  }
  .title-center .subtitle {
    font-size: 13px;
    color: #555;
  }
  .japan-flag {
    font-size: 36px;
  }

  .progress-bar-wrap {
    background: #ddd;
    border-radius: 20px;
    height: 10px;
    margin: 16px 20px 0;
  }
  .progress-bar {
    height: 10px;
    background: linear-gradient(90deg, #e74c3c, #f39c12);
    border-radius: 20px;
    transition: width 0.5s;
  }
  .progress-label {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin: 4px 0 10px;
  }

  .game-area {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
  }

  .score-area {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 16px;
  }
  .score-box {
    background: #fff;
    border-radius: 12px;
    padding: 8px 20px;
    text-align: center;
    border: 2px solid #e0e0e0;
    min-width: 90px;
  }
  .score-box .val {
    font-size: 22px;
    font-weight: 800;
    color: #2c3e50;
  }
  .score-box .lbl {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
  }
  .score-box.giusti .val { color: #27ae60; }
  .score-box.sbagliati .val { color: #e74c3c; }

  .character-bubble-area {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-bottom: 16px;
  }
  .brioshi-img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid #e74c3c;
    object-fit: cover;
    flex-shrink: 0;
    background: #ffe0cc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    overflow: hidden;
  }
  .bubble {
    background: #fff;
    border: 2.5px solid #e74c3c;
    border-radius: 20px 20px 20px 4px;
    padding: 14px 18px;
    font-size: 20px;
    font-weight: 700;
    color: #2c3e50;
    flex: 1;
    position: relative;
    box-shadow: 2px 2px 0 #f8c8c8;
    min-height: 64px;
    display: flex;
    align-items: center;
  }
  .bubble::before {
    content: '';
    position: absolute;
    left: -14px;
    bottom: 12px;
    border: 7px solid transparent;
    border-right-color: #e74c3c;
  }
  .bubble::after {
    content: '';
    position: absolute;
    left: -10px;
    bottom: 13px;
    border: 6px solid transparent;
    border-right-color: #fff;
  }

  .answer-area {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    border: 2px solid #e0e0e0;
    margin-bottom: 14px;
  }
  .answer-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
  }
  .answer-input {
    width: 100%;
    font-size: 22px;
    border: 2px solid #ddd;
    border-radius: 10px;
    padding: 10px 14px;
    outline: none;
    transition: border 0.2s;
    color: #2c3e50;
    font-family: 'Courier New', monospace;
    font-weight: 700;
  }
  .answer-input:focus { border-color: #3498db; }
  .answer-input.correct { border-color: #27ae60; background: #eafaf1; }
  .answer-input.wrong { border-color: #e74c3c; background: #fdf0f0; }

  .buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 14px;
  }
  button {
    border: none;
    border-radius: 10px;
    padding: 11px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:active { transform: scale(0.96); }
  .btn-check { background: #3498db; color: #fff; }
  .btn-check:hover { background: #2980b9; }
  .btn-show { background: #f39c12; color: #fff; }
  .btn-show:hover { background: #e67e22; }
  .btn-next { background: #27ae60; color: #fff; display: none; }
  .btn-next:hover { background: #229954; }
  .btn-reset { background: #e74c3c; color: #fff; }
  .btn-reset:hover { background: #c0392b; }

  .feedback {
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .feedback.ok { background: #eafaf1; color: #1e8449; }
  .feedback.no { background: #fdf0f0; color: #922b21; }
  .feedback.info { background: #eaf4fb; color: #1a5276; }
  .feedback.hidden { visibility: hidden; }

  .correct-answer {
    font-size: 14px;
    color: #555;
    text-align: center;
    margin-bottom: 10px;
    min-height: 20px;
  }
  .correct-answer span {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: #1a5276;
    background: #eaf4fb;
    padding: 2px 8px;
    border-radius: 6px;
  }

  .flag-deco {
    text-align: center;
    font-size: 15px;
    color: #aaa;
    margin-top: 6px;
  }

  .end-screen {
    display: none;
    text-align: center;
    background: #fff;
    border-radius: 20px;
    padding: 30px;
    border: 3px solid #e74c3c;
  }
  .end-screen h2 { font-size: 28px; color: #e74c3c; margin-bottom: 10px; }
  .end-screen p { font-size: 18px; color: #444; margin-bottom: 20px; }
  .star { font-size: 40px; }

  .hint-jp {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <a class="logo-area" href="https://matematicaconlemani.wordpress.com/" target="_blank">
    <img src="logo.png" alt="logo">
    <div class="blog-name">Matematiche non si nasce</div>
  </a>
  <div class="title-center">
    <h1>🧮 Traduci per Brioshi!</h1>
    <div class="subtitle"></div>
  </div>
  <div class="japan-flag">🇯🇵</div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progBar" style="width:0%"></div>
</div>
<div class="progress-label" id="progLabel">Domanda 1 di 40</div>

<div class="game-area" id="gameArea">
  <div class="score-area">
    <div class="score-box giusti"><div class="val" id="giusti">0</div><div class="lbl">✅ Giusti</div></div>
    <div class="score-box"><div class="val" id="totale">0</div><div class="lbl">📝 Tentati</div></div>
    <div class="score-box sbagliati"><div class="val" id="sbagliati">0</div><div class="lbl">❌ Sbagliati</div></div>
  </div>

  <div class="character-bubble-area">
    <div class="brioshi-img">👦🏻</div>
    <div class="bubble" id="frase">Caricamento...</div>
  </div>
  <div class="hint-jp">🇯🇵 Brioshi parla solo matematichese... traducimi!</div>

  <div class="answer-area">
    <div class="answer-label">Scrivi la traduzione in matematichese:</div>
    <input type="text" class="answer-input" id="risposta"
           placeholder="es. 7 + 5" autocomplete="off"
           onkeydown="if(event.key==='Enter') controlla()">
  </div>

  <div class="feedback hidden" id="feedback"></div>
  <div class="correct-answer" id="correctShow"></div>

  <div class="buttons">
    <button class="btn-check" onclick="controlla()">✔ Controlla</button>
    <button class="btn-show" onclick="mostraRisposta()">💡 Mostra risposta</button>
    <button class="btn-next" id="btnNext" onclick="prossima()">▶ Prossima</button>
    <button class="btn-reset" onclick="ricomincia()">🔄 Ricomincia</button>
  </div>
  <div class="flag-deco">🎌 Matematiche non si nasce — si impara! 🎌</div>
</div>

<div class="end-screen" id="endScreen">
  <div class="star">🎉</div>
  <h2>Bravo/a!</h2>
  <p id="endMsg"></p>
  <button class="btn-reset" style="font-size:18px;padding:14px 30px;" onclick="ricomincia()">🔄 Gioca ancora!</button>
</div>

<script>
const domande = [
  { f: "A 7 aggiungi 5", r: ["7+5", "7 + 5"] },
  { f: "Somma 8 e 3", r: ["8+3", "8 + 3"] },
  { f: "Aggiungi 11 a 6", r: ["6+11", "6 + 11", "11+6", "11 + 6"] },
  { f: "Addiziona 4 al 9", r: ["9+4", "9 + 4", "4+9", "4 + 9"] },
  { f: "Aumenta di 7 il 24", r: ["24+7", "24 + 7", "7+24"] },
  { f: "Raddoppia 4", r: ["4×2", "4 × 2", "4*2", "4 * 2", "2×4", "2*4"] },
  { f: "A 15 togli 8", r: ["15-8", "15 - 8"] },
  { f: "Togli 13 a 17", r: ["17-13", "17 - 13"] },
  { f: "Sottrai 2 a 11", r: ["11-2", "11 - 2"] },
  { f: "A 19 sottrai 3", r: ["19-3", "19 - 3"] },
  { f: "Moltiplica 5 per 9", r: ["5×9", "5 × 9", "5*9", "9×5", "9*5"] },
  { f: "Moltiplica per 7 il 4", r: ["4×7", "4 × 7", "7×4", "4*7"] },
  { f: "Raddoppia il 6", r: ["6×2", "6 × 2", "6*2", "2×6"] },
  { f: "Dividi 24 per 3", r: ["24÷3", "24 ÷ 3", "24/3"] },
  { f: "Dividi per 6 il 42", r: ["42÷6", "42 ÷ 6", "42/6"] },
  { f: "Dimezza 14", r: ["14÷2", "14 ÷ 2", "14/2"] },
  { f: "A 14 aggiungi 9 e indica il risultato", r: ["14+9=23", "14 + 9 = 23"] },
  { f: "Addiziona 10 a 8 e indica la somma", r: ["8+10=18", "8 + 10 = 18", "10+8=18"] },
  { f: "Triplica 5 e trova il risultato", r: ["5×3=15", "5 × 3 = 15", "3×5=15"] },
  { f: "A 12 togli 7 e mostra la differenza", r: ["12-7=5", "12 - 7 = 5"] },
  { f: "Togli 5 a 11 e indica il risultato", r: ["11-5=6", "11 - 5 = 6"] },
  { f: "Sottrai 8 a 19 e trova la differenza", r: ["19-8=11", "19 - 8 = 11"] },
  { f: "Moltiplica 5 per 9 e indica il prodotto", r: ["5×9=45", "5 × 9 = 45", "9×5=45"] },
  { f: "Moltiplica per 7 il 4 e trova il risultato", r: ["4×7=28", "4 × 7 = 28", "7×4=28"] },
  { f: "Dividi 24 per 3 e mostra il quoziente", r: ["24÷3=8", "24 ÷ 3 = 8", "24/3=8"] },
  { f: "Dividi per 8 il 56 e indica il risultato", r: ["56÷8=7", "56 ÷ 8 = 7", "56/8=7"] },
  { f: "Dimezza 10 e scrivi il risultato", r: ["10÷2=5", "10 ÷ 2 = 5", "10/2=5"] },
  { f: "Qual è il risultato dell'addizione fra 12 e 2?", r: ["12+2=14", "12 + 2 = 14"] },
  { f: "Trova la somma tra 14 e 5", r: ["14+5=19", "14 + 5 = 19", "5+14=19"] },
  { f: "Quanto fa 13 più 9?", r: ["13+9=22", "13 + 9 = 22"] },
  { f: "Trova il risultato della sottrazione tra 15 e 9", r: ["15-9=6", "15 - 9 = 6"] },
  { f: "Trova la differenza tra 11 e 7", r: ["11-7=4", "11 - 7 = 4"] },
  { f: "Quanto è 18 diminuito di 8?", r: ["18-8=10", "18 - 8 = 10"] },
  { f: "Di quanto 7 è più piccolo di 13?", r: ["13-7=6", "13 - 7 = 6"] },
  { f: "Trova il prodotto tra 8 e 6", r: ["8×6=48", "8 × 6 = 48", "6×8=48"] },
  { f: "Qual è il risultato della moltiplicazione tra 9 e 3?", r: ["9×3=27", "9 × 3 = 27", "3×9=27"] },
  { f: "Trova il doppio di 11", r: ["11×2=22", "11 × 2 = 22", "2×11=22"] },
  { f: "Quanto fa 5 per 8?", r: ["5×8=40", "5 × 8 = 40", "8×5=40"] },
  { f: "Quanto fa 6 moltiplicato per 5?", r: ["6×5=30", "6 × 5 = 30", "5×6=30"] },
  { f: "Trova il quoziente fra 32 e 4", r: ["32÷4=8", "32 ÷ 4 = 8", "32/4=8"] },
  { f: "Qual è il risultato della divisione fra 72 e 8?", r: ["72÷8=9", "72 ÷ 8 = 9", "72/8=9"] },
  { f: "Trova la metà di 30", r: ["30÷2=15", "30 ÷ 2 = 15", "30/2=15"] },
  { f: "Trova quante volte il 10 sta nel 40", r: ["40÷10=4", "40 ÷ 10 = 4", "40/10=4"] },
  { f: "Quanto fa 63 diviso 7?", r: ["63÷7=9", "63 ÷ 7 = 9", "63/7=9"] }
];

let indice = 0, giustiC = 0, sbagliatiC = 0, tentati = 0, bloccata = false;

function normalizza(s) {
  return s.trim().toLowerCase()
    .replace(/\s+/g, '')
    .replace(/x/g, '×')
    .replace(/\*/g, '×')
    .replace(/:/g, '÷')
    .replace(/\//g, '÷')
    .replace(/=\s*/g, '=');
}

function caricaDomanda() {
  bloccata = false;
  const d = domande[indice];
  document.getElementById('frase').textContent = d.f;
  document.getElementById('risposta').value = '';
  document.getElementById('risposta').className = 'answer-input';
  document.getElementById('feedback').className = 'feedback hidden';
  document.getElementById('feedback').textContent = '';
  document.getElementById('correctShow').innerHTML = '';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('risposta').focus();

  const pct = (indice / domande.length) * 100;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `Domanda ${indice+1} di ${domande.length}`;
}

function controlla() {
  if (bloccata) return;
  const inp = document.getElementById('risposta');
  const val = inp.value.trim();
  if (!val) return;

  bloccata = true;
  tentati++;
  document.getElementById('totale').textContent = tentati;

  const norm = normalizza(val);
  const d = domande[indice];
  const esatta = d.r.some(r => normalizza(r) === norm);

  const fb = document.getElementById('feedback');
  const cs = document.getElementById('correctShow');

  if (esatta) {
    inp.className = 'answer-input correct';
    fb.className = 'feedback ok';
    fb.innerHTML = '✅ Esatto!';
    cs.innerHTML = '';
    giustiC++;
    document.getElementById('giusti').textContent = giustiC;
  } else {
    inp.className = 'answer-input wrong';
    fb.className = 'feedback no';
    fb.innerHTML = '❌ Non è corretto. Riprova o clicca "Mostra risposta"!';
    cs.innerHTML = '';
    sbagliatiC++;
    document.getElementById('sbagliati').textContent = sbagliatiC;
  }

  document.getElementById('btnNext').style.display = 'inline-block';
}

function mostraRisposta() {
  if (!bloccata) { bloccata = true; tentati++; document.getElementById('totale').textContent = tentati; }
  const d = domande[indice];
  const fb = document.getElementById('feedback');
  fb.className = 'feedback info';
  fb.innerHTML = '💡 Ecco la risposta corretta:';
  document.getElementById('correctShow').innerHTML = `<span>${d.r[0]}</span>`;
  document.getElementById('risposta').className = 'answer-input wrong';
  document.getElementById('btnNext').style.display = 'inline-block';
}

function prossima() {
  indice++;
  if (indice >= domande.length) {
    mostraFine();
  } else {
    caricaDomanda();
  }
}

function mostraFine() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('endScreen').style.display = 'block';
  const pct = Math.round((giustiC / domande.length) * 100);
  let msg = '';
  if (pct >= 90) msg = `Hai tradotto ${giustiC} frasi su ${domande.length} correttamente! 🌟 Sei un campione del matematichese!`;
  else if (pct >= 70) msg = `Hai tradotto ${giustiC} frasi su ${domande.length} correttamente! 👏 Ottimo lavoro!`;
  else if (pct >= 50) msg = `Hai tradotto ${giustiC} frasi su ${domande.length} correttamente! 💪 Continua ad esercitarti!`;
  else msg = `Hai tradotto ${giustiC} frasi su ${domande.length}. 📚 Riprova, puoi migliorare!`;
  document.getElementById('endMsg').textContent = msg;
  document.getElementById('progBar').style.width = '100%';
}

function ricomincia() {
  indice = 0; giustiC = 0; sbagliatiC = 0; tentati = 0;
  document.getElementById('giusti').textContent = 0;
  document.getElementById('sbagliati').textContent = 0;
  document.getElementById('totale').textContent = 0;
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('endScreen').style.display = 'none';
  caricaDomanda();
}

caricaDomanda();
</script>
</body>
</html>
