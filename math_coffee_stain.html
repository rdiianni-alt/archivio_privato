<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Macchia di Caffè</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #fdf6e3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* LOGO */
 <img src="logo.png" alt="Logo" style="width: 90px;">
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 10px;
  }
  .logo-circle {
    width: 90px; height: 90px;
    border: 3px solid #222;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #222;
    text-align: center;
    padding: 6px;
    position: relative;
    background: #fdf6e3;
  }
  .logo-face { font-size: 28px; line-height: 1; }
  .logo-symbols { font-size: 8px; letter-spacing: 1px; color: #555; }
  .logo-text {
    font-size: 11px;
    font-style: italic;
    color: #444;
    margin-top: 3px;
    letter-spacing: 1px;
  }
  .logo-text span { text-decoration: line-through; color: #c0392b; }

  h1 {
    font-size: 1.6rem;
    color: #5d3a1a;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 16px; }

  /* SETUP PANEL */
  .setup {
    background: white;
    border-radius: 16px;
    padding: 20px 28px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
  }
  .setup h2 { font-size: 1rem; color: #5d3a1a; margin-bottom: 14px; }
  .setup-row { margin-bottom: 14px; }
  .setup-row label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: bold; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn-opt {
    padding: 7px 14px;
    border: 2px solid #c8a97e;
    border-radius: 20px;
    background: white;
    color: #5d3a1a;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: Georgia, serif;
  }
  .btn-opt.active {
    background: #c8a97e;
    color: white;
    border-color: #a07850;
  }
  .btn-opt:hover { background: #f0e0c8; }

  .btn-start {
    width: 100%;
    padding: 12px;
    background: #5d3a1a;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: Georgia, serif;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .btn-start:hover { background: #7a4f2a; }

  /* GAME AREA */
  .game-area {
    width: 100%;
    max-width: 480px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* SCHEDA */
  .scheda {
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
    padding: 28px 24px 20px;
    width: 100%;
    position: relative;
    border: 2px solid #e8d5b0;
  }
  .scheda-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
    font-size: 0.75rem;
    color: #aaa;
  }
  .scheda-logo-mini {
    font-size: 0.7rem;
    font-style: italic;
    color: #bbb;
  }
  .scheda-logo-mini span { text-decoration: line-through; color: #e8a0a0; }

  /* OPERAZIONE */
  .operation-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 90px;
    flex-wrap: wrap;
  }

  .num-box {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .digit-cell {
    width: 52px; height: 70px;
    border: 2px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    font-weight: bold;
    color: #222;
    border-radius: 4px;
    position: relative;
    background: white;
  }
  .digit-cell.decimal-dot {
    border: none;
    width: 18px;
    font-size: 2rem;
    color: #222;
  }

  /* MACCHIA */
  .stain-wrap {
    position: relative;
    width: 52px; height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stain-wrap .digit-cell {
    position: absolute;
    z-index: 1;
  }
  .stain-svg {
    position: absolute;
    z-index: 2;
    width: 72px; height: 78px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .op-sign {
    font-size: 2.2rem;
    font-weight: bold;
    color: #444;
    margin: 0 4px;
  }
  .eq-sign {
    font-size: 2.2rem;
    font-weight: bold;
    color: #444;
    margin: 0 4px;
  }

  /* INPUT */
  .answer-row {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .answer-label { font-size: 0.9rem; color: #666; }
  .answer-input {
    width: 120px;
    text-align: center;
    font-size: 1.8rem;
    border: 2px solid #c8a97e;
    border-radius: 8px;
    padding: 6px;
    font-family: Georgia, serif;
    color: #5d3a1a;
    outline: none;
  }
  .answer-input:focus { border-color: #a07850; }

  .btn-check {
    padding: 10px 28px;
    background: #c8a97e;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-family: Georgia, serif;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 1px;
  }
  .btn-check:hover { background: #a07850; }

  .feedback {
    font-size: 1.1rem;
    font-weight: bold;
    min-height: 28px;
    text-align: center;
  }
  .feedback.correct { color: #27ae60; }
  .feedback.wrong { color: #c0392b; }

  .score-row {
    display: flex;
    gap: 24px;
    font-size: 0.9rem;
    color: #666;
  }
  .score-row span { font-weight: bold; color: #5d3a1a; }

  .btn-next {
    padding: 9px 24px;
    background: #5d3a1a;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: Georgia, serif;
    cursor: pointer;
    display: none;
    transition: background 0.2s;
  }
  .btn-next:hover { background: #7a4f2a; }
  .btn-reset {
    font-size: 0.8rem;
    color: #aaa;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- LOGO -->
<div class="logo">
  <div class="logo-circle">
    <div class="logo-symbols">% 0 1 · ♦ 1 · 4</div>
    <div class="logo-face">😊</div>
    <div class="logo-symbols">∞ ◻ △ 8 5 ◇</div>
  </div>
  <div class="logo-text">matematiche <span>non</span> si nasce</div>
</div>

<h1>☕ La Macchia di Caffè</h1>
<p class="subtitle">Trova la cifra nascosta!</p>

<!-- SETUP -->
<div class="setup" id="setup">
  <h2>⚙️ Impostazioni del gioco</h2>

  <div class="setup-row">
    <label>Livello (numeri entro…)</label>
    <div class="btn-group" id="levelGroup">
      <button class="btn-opt active" data-val="20">20</button>
      <button class="btn-opt" data-val="100">100</button>
      <button class="btn-opt" data-val="1000">1.000</button>
      <button class="btn-opt" data-val="10000">10.000</button>
      <button class="btn-opt" data-val="dec">Decimali</button>
    </div>
  </div>

  <div class="setup-row">
    <label>Operazione</label>
    <div class="btn-group" id="opGroup">
      <button class="btn-opt active" data-val="+">➕ Addizione</button>
      <button class="btn-opt" data-val="-">➖ Sottrazione</button>
      <button class="btn-opt" data-val="both">Entrambe</button>
    </div>
  </div>

  <button class="btn-start" onclick="startGame()">▶ Inizia il gioco</button>
</div>

<!-- GAME -->
<div class="game-area" id="gameArea">
  <div class="score-row">
    <div>✅ Corrette: <span id="scoreOk">0</span></div>
    <div>❌ Errori: <span id="scoreErr">0</span></div>
  </div>

  <div class="scheda" id="scheda">
    <div class="scheda-header">
      <div>Trova la cifra nascosta dalla macchia!</div>
      <div class="scheda-logo-mini">matematiche <span>non</span> si nasce</div>
    </div>
    <div class="operation-row" id="opRow"></div>
    <div class="answer-row">
      <div class="answer-label">Quale cifra si nasconde sotto la macchia?</div>
      <input class="answer-input" type="number" id="answerInput" min="0" max="9" placeholder="0–9" onkeydown="if(event.key==='Enter') checkAnswer()">
      <button class="btn-check" onclick="checkAnswer()">Controlla ✓</button>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btnNext" onclick="nextRound()">Prossima ➜</button>
    </div>
  </div>

  <button class="btn-reset" onclick="resetGame()">← Cambia impostazioni</button>
</div>

<script>
let level = '20', op = '+';
let correctDigit = 0;
let scoreOk = 0, scoreErr = 0;
let answered = false;

// Setup buttons
function setupGroup(groupId, varSetter) {
  const btns = document.querySelectorAll(`#${groupId} .btn-opt`);
  btns.forEach(b => {
    b.addEventListener('click', () => {
      btns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      varSetter(b.dataset.val);
    });
  });
}
setupGroup('levelGroup', v => level = v);
setupGroup('opGroup', v => op = v);

function startGame() {
  document.getElementById('setup').style.display = 'none';
  const ga = document.getElementById('gameArea');
  ga.style.display = 'flex';
  scoreOk = 0; scoreErr = 0;
  updateScore();
  nextRound();
}

function resetGame() {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('gameArea').style.display = 'none';
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getMax() {
  if (level === '20') return 20;
  if (level === '100') return 100;
  if (level === '1000') return 1000;
  if (level === '10000') return 10000;
  return 10; // decimals base
}

function chooseOp() {
  if (op === 'both') return Math.random() < 0.5 ? '+' : '-';
  return op;
}

function generateProblem() {
  const operation = chooseOp();
  let a, b, result;

  if (level === 'dec') {
    a = +(Math.random() * 9 + 0.1).toFixed(2);
    b = +(Math.random() * 9 + 0.1).toFixed(2);
    if (operation === '-' && b > a) [a, b] = [b, a];
    result = +(operation === '+' ? a + b : a - b).toFixed(2);
  } else {
    const max = getMax();
    const min = max / 10; // same number of digits
    a = rand(min, max - 1);
    if (operation === '+') {
      // b same digit count as a, result must not exceed max
      b = rand(min, Math.min(max - a, max - 1));
      result = a + b;
    } else {
      b = rand(min, a);
      result = a - b;
      // ensure result has same digit count as a and b
      if (result < min) {
        b = rand(min, a - min);
        result = a - b;
      }
    }
  }
  return { a, b, result, operation };
}

// Represent number as array of digit-strings (with dot if decimal)
function numToTokens(n) {
  const s = String(n);
  const tokens = [];
  for (const c of s) {
    if (c === '.') tokens.push({ type: 'dot', val: ',' });
    else tokens.push({ type: 'digit', val: c });
  }
  return tokens;
}

function nextRound() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('answerInput').value = '';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('answerInput').disabled = false;

  const prob = generateProblem();
  const { a, b, result, operation } = prob;

  // Collect all digit positions: [which number (a/b/result), index in tokens]
  const tokA = numToTokens(a);
  const tokB = numToTokens(b);
  const tokR = numToTokens(result);

  const digitPositions = [];
  tokA.forEach((t, i) => { if (t.type === 'digit') digitPositions.push({ num: 'a', idx: i }); });
  tokB.forEach((t, i) => { if (t.type === 'digit') digitPositions.push({ num: 'b', idx: i }); });
  tokR.forEach((t, i) => { if (t.type === 'digit') digitPositions.push({ num: 'r', idx: i }); });

  // Choose random digit to hide
  const chosen = digitPositions[rand(0, digitPositions.length - 1)];
  const hiddenNum = chosen.num;
  const hiddenIdx = chosen.idx;

  if (hiddenNum === 'a') correctDigit = parseInt(tokA[hiddenIdx].val);
  else if (hiddenNum === 'b') correctDigit = parseInt(tokB[hiddenIdx].val);
  else correctDigit = parseInt(tokR[hiddenIdx].val);

  // Build HTML
  const opRow = document.getElementById('opRow');
  opRow.innerHTML = '';

  function buildNumHTML(tokens, hiddenIdx) {
    const box = document.createElement('div');
    box.className = 'num-box';
    tokens.forEach((t, i) => {
      if (t.type === 'dot') {
        const dot = document.createElement('div');
        dot.className = 'digit-cell decimal-dot';
        dot.textContent = ',';
        box.appendChild(dot);
      } else if (t.type === 'digit') {
        if (hiddenIdx !== null && i === hiddenIdx) {
          // STAIN
          const wrap = document.createElement('div');
          wrap.className = 'stain-wrap';
          const cell = document.createElement('div');
          cell.className = 'digit-cell';
          cell.textContent = t.val; // hidden but under stain
          wrap.appendChild(cell);
          wrap.innerHTML += stainSVG();
          box.appendChild(wrap);
        } else {
          const cell = document.createElement('div');
          cell.className = 'digit-cell';
          cell.textContent = t.val;
          box.appendChild(cell);
        }
      }
    });
    return box;
  }

  opRow.appendChild(buildNumHTML(tokA, hiddenNum === 'a' ? hiddenIdx : null));

  const opSign = document.createElement('div');
  opSign.className = 'op-sign';
  opSign.textContent = operation;
  opRow.appendChild(opSign);

  opRow.appendChild(buildNumHTML(tokB, hiddenNum === 'b' ? hiddenIdx : null));

  const eq = document.createElement('div');
  eq.className = 'eq-sign';
  eq.textContent = '=';
  opRow.appendChild(eq);

  opRow.appendChild(buildNumHTML(tokR, hiddenNum === 'r' ? hiddenIdx : null));

  document.getElementById('answerInput').focus();
}

function stainSVG() {
  // Organic coffee stain shape
  const hue = rand(20, 35);
  const sat = rand(40, 60);
  const lig = rand(48, 62);
  return `<svg class="stain-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="52" rx="42" ry="38" fill="hsl(${hue},${sat}%,${lig}%)" opacity="0.92"/>
    <ellipse cx="44" cy="46" rx="28" ry="22" fill="hsl(${hue},${sat+5}%,${lig-8}%)" opacity="0.55"/>
    <ellipse cx="58" cy="60" rx="18" ry="14" fill="hsl(${hue},${sat}%,${lig+10}%)" opacity="0.3"/>
    <ellipse cx="36" cy="64" rx="14" ry="10" fill="hsl(${hue},${sat+8}%,${lig-12}%)" opacity="0.4"/>
  </svg>`;
}

function checkAnswer() {
  if (answered) return;
  const val = document.getElementById('answerInput').value.trim();
  if (val === '') return;
  const guess = parseInt(val);
  const fb = document.getElementById('feedback');
  answered = true;
  document.getElementById('answerInput').disabled = true;
  document.getElementById('btnNext').style.display = 'inline-block';

  if (guess === correctDigit) {
    fb.textContent = '🎉 Risposta corretta!';
    fb.className = 'feedback correct';
    scoreOk++;
  } else {
    fb.textContent = `❌ La cifra nascosta era ${correctDigit}. Riprova!`;
    fb.className = 'feedback wrong';
    scoreErr++;
  }
  updateScore();
}

function updateScore() {
  document.getElementById('scoreOk').textContent = scoreOk;
  document.getElementById('scoreErr').textContent = scoreErr;
}
</script>
</body>
</html>
