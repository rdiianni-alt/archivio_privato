<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spesa al Supermercato</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f7e6; min-height: 100vh; }

  /* HEADER */
  .header { text-align: center; padding: 18px 0 10px; }
  .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 4px; }
  .logo img { width: 60px; height: 60px; object-fit: contain; border-radius: 50%; }
  .blog-title { font-size: 20px; font-weight: 700; color: #2e7d32; letter-spacing: 0.5px; }
  .game-title { font-size: 26px; font-weight: 800; color: #1b5e20; margin-top: 2px; }

  /* LIVELLO */
  .level-btns { display: flex; gap: 12px; justify-content: center; margin: 12px 0 0; }
  .level-btn { padding: 8px 28px; border-radius: 20px; border: 2px solid #388e3c; background: #fff; color: #388e3c; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; }
  .level-btn.active { background: #388e3c; color: #fff; }

  /* MAIN */
  .container { max-width: 700px; margin: 0 auto; padding: 16px; }

  /* CARRELLO */
  .carrello { background: #fff; border-radius: 16px; border: 2px solid #a5d6a7; padding: 16px; margin-bottom: 14px; }
  .carrello h2 { font-size: 17px; color: #2e7d32; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .item-card { background: #f1f8e9; border-radius: 12px; border: 1.5px solid #c8e6c9; padding: 10px; text-align: center; }
  .item-emoji { font-size: 36px; line-height: 1; }
  .item-name { font-size: 13px; color: #555; margin: 4px 0 2px; }
  .item-price { font-size: 15px; font-weight: 700; color: #2e7d32; }

  /* TOTALE */
  .totale-box { background: #e8f5e9; border-radius: 12px; border: 2px solid #a5d6a7; padding: 12px 18px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .totale-label { font-size: 16px; color: #555; }
  .totale-val { font-size: 24px; font-weight: 800; color: #1b5e20; }

  /* BANCONOTE */
  .banconote-box { background: #fff; border-radius: 16px; border: 2px solid #a5d6a7; padding: 16px; margin-bottom: 14px; }
  .banconote-box h2 { font-size: 17px; color: #2e7d32; margin-bottom: 12px; }
  .banconote-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .banconota { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .banconota .bill { border-radius: 10px; font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; min-width: 72px; height: 42px; border: 2px solid rgba(0,0,0,0.12); transition: transform .15s; user-select: none; position: relative; }
  .banconota .bill:active { transform: scale(0.93); }
  .banconota .bill.b1  { background: #fffde7; color: #f9a825; border-color: #f9a825; }
  .banconota .bill.b2  { background: #e8f5e9; color: #388e3c; border-color: #388e3c; }
  .banconota .bill.b5  { background: #e3f2fd; color: #1565c0; border-color: #1565c0; }
  .banconota .bill.b10 { background: #fce4ec; color: #c62828; border-color: #c62828; }
  .banconota .bill.b20 { background: #f3e5f5; color: #6a1b9a; border-color: #6a1b9a; }
  .banconota .bill.b50 { background: #fff3e0; color: #e65100; border-color: #e65100; }
  .banconota .count-badge { background: #2e7d32; color: #fff; border-radius: 50%; width: 22px; height: 22px; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .banconota-lbl { font-size: 12px; color: #888; }

  /* PAGAMENTO INFO */
  .pagato-box { background: #f9f9f9; border-radius: 12px; border: 1.5px solid #ddd; padding: 10px 16px; margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; }
  .pagato-info { font-size: 15px; color: #555; }
  .pagato-info span { font-weight: 700; color: #1b5e20; }
  .reset-btn { padding: 6px 16px; border-radius: 10px; border: 1.5px solid #bbb; background: #fff; color: #888; font-size: 13px; cursor: pointer; }
  .reset-btn:hover { background: #f5f5f5; }

  /* RISPOSTA BAMBINO */
  .risposta-box { background: #fff; border-radius: 16px; border: 2px solid #a5d6a7; padding: 16px; margin-bottom: 14px; }
  .risposta-box h2 { font-size: 17px; color: #2e7d32; margin-bottom: 10px; }
  .input-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .input-row label { font-size: 15px; color: #555; }
  .resto-input { width: 110px; padding: 8px 12px; border-radius: 8px; border: 2px solid #a5d6a7; font-size: 18px; font-weight: 700; color: #1b5e20; text-align: center; }
  .verifica-btn { padding: 10px 28px; border-radius: 20px; background: #2e7d32; color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; }
  .verifica-btn:hover { background: #1b5e20; }

  /* FEEDBACK */
  .feedback { border-radius: 14px; padding: 14px 18px; margin-bottom: 14px; font-size: 17px; font-weight: 700; text-align: center; display: none; }
  .feedback.ok  { background: #e8f5e9; color: #2e7d32; border: 2px solid #a5d6a7; }
  .feedback.err { background: #ffebee; color: #c62828; border: 2px solid #ef9a9a; }

  /* NUOVO */
  .nuovo-btn { display: block; margin: 0 auto; padding: 12px 40px; border-radius: 24px; background: #43a047; color: #fff; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: background .2s; }
  .nuovo-btn:hover { background: #2e7d32; }

  /* PUNTEGGIO */
  .score-bar { display: flex; gap: 20px; justify-content: center; margin-bottom: 10px; }
  .score-item { font-size: 15px; color: #555; }
  .score-item span { font-weight: 700; color: #2e7d32; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/matematicanosinace/matematicanosinace.github.io/main/logo.png"
           onerror="this.style.display='none'"
           alt="Logo Matematica Non Si Nasce">
    </div>
    <div>
      <div class="blog-title">Matematiche Non Si Nasce</div>
      <div class="game-title">🛒 Spesa al Supermercato</div>
    </div>
  </div>
  <div class="level-btns">
    <button class="level-btn active" onclick="setLevel(1)">Livello 1 — Prezzi interi</button>
    <button class="level-btn" onclick="setLevel(2)">Livello 2 — Con i ,50</button>
  </div>
</div>

<div class="container">
  <div class="score-bar">
    <div class="score-item">✅ Corrette: <span id="s-ok">0</span></div>
    <div class="score-item">❌ Errori: <span id="s-err">0</span></div>
  </div>

  <!-- CARRELLO -->
  <div class="carrello">
    <h2>🧺 Articoli nel carrello</h2>
    <div class="items-grid" id="items-grid"></div>
  </div>

  <!-- TOTALE -->
  <div class="totale-box">
    <div class="totale-label">Totale da pagare:</div>
    <div class="totale-val" id="totale-val">€ —</div>
  </div>

  <!-- BANCONOTE -->
  <div class="banconote-box">
    <h2>💶 Scegli le banconote per pagare</h2>
    <div class="banconote-grid" id="banconote-grid"></div>
  </div>

  <!-- INFO PAGAMENTO -->
  <div class="pagato-box">
    <div class="pagato-info">Hai dato: <span id="dato-val">€ 0,00</span></div>
    <div class="pagato-info">Totale: <span id="tot-ref">€ —</span></div>
    <button class="reset-btn" onclick="resetBanconote()">↺ Azzera</button>
  </div>

  <!-- RISPOSTA RESTO -->
  <div class="risposta-box">
    <h2>💰 Quanto resto ti dà la cassiera?</h2>
    <div class="input-row">
      <label for="resto-input">Resto: €</label>
      <input type="number" id="resto-input" class="resto-input" min="0" step="0.50" placeholder="0,00">
      <button class="verifica-btn" onclick="verifica()">Controlla ✓</button>
    </div>
  </div>

  <!-- FEEDBACK -->
  <div class="feedback" id="feedback"></div>

  <!-- NUOVO ROUND -->
  <button class="nuovo-btn" onclick="nuovoRound()">🔄 Nuova spesa</button>
</div>

<script>
const PRODOTTI = [
  {n:'Gelato',e:'🍦'},{n:'Pane',e:'🍞'},{n:'Latte',e:'🥛'},{n:'Mela',e:'🍎'},
  {n:'Banana',e:'🍌'},{n:'Cioccolato',e:'🍫'},{n:'Succo',e:'🧃'},{n:'Acqua',e:'💧'},
  {n:'Biscotti',e:'🍪'},{n:'Formaggio',e:'🧀'},{n:'Yogurt',e:'🥣'},{n:'Uova',e:'🥚'},
  {n:'Pizza',e:'🍕'},{n:'Pasta',e:'🍝'},{n:'Pomodori',e:'🍅'},{n:'Arance',e:'🍊'},
  {n:'Fragole',e:'🍓'},{n:'Burro',e:'🧈'},{n:'Succo arancia',e:'🍹'},{n:'Miele',e:'🍯'}
];
const BANCONOTE = [1,2,5,10,20,50];
const CLASSI = {1:'b1',2:'b2',5:'b5',10:'b10',20:'b20',50:'b50'};

let livello = 1, totale = 0, selBanconote = {1:0,2:0,5:0,10:0,20:0,50:0};
let scoreOk = 0, scoreErr = 0;

function r(n){ return Math.round(n*100)/100; }
function fmt(n){ return n.toFixed(2).replace('.',','); }

function setLevel(l){
  livello = l;
  document.querySelectorAll('.level-btn').forEach((b,i)=>b.classList.toggle('active',i===l-1));
  nuovoRound();
}

function prezzoRandom(){
  let base = Math.floor(Math.random()*9)+1;
  if(livello===2 && Math.random()<0.6) return base+0.5;
  return base;
}

function nuovoRound(){
  document.getElementById('feedback').style.display='none';
  document.getElementById('resto-input').value='';
  resetBanconote();
  let n = [3,5,7][Math.floor(Math.random()*3)];
  let pool = [...PRODOTTI].sort(()=>Math.random()-0.5).slice(0,n);
  pool.forEach(p=>p.prezzo=prezzoRandom());
  totale = r(pool.reduce((s,p)=>s+p.prezzo,0));

  let grid = document.getElementById('items-grid');
  grid.innerHTML = pool.map(p=>`
    <div class="item-card">
      <div class="item-emoji">${p.e}</div>
      <div class="item-name">${p.n}</div>
      <div class="item-price">€ ${fmt(p.prezzo)}</div>
    </div>`).join('');

  document.getElementById('totale-val').textContent = '€ '+fmt(totale);
  document.getElementById('tot-ref').textContent = '€ '+fmt(totale);
  renderBanconote();
}

function renderBanconote(){
  let html='';
  BANCONOTE.forEach(v=>{
    let cls = CLASSI[v];
    let cnt = selBanconote[v];
    html+=`<div class="banconota">
      <div class="bill ${cls}" onclick="addBanconota(${v})">€ ${v}
        ${cnt>0?`<div style="position:absolute;top:-8px;right:-8px;background:#c62828;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;">${cnt}</div>`:''}
      </div>
      <span class="banconota-lbl">clicca per aggiungere</span>
    </div>`;
  });
  document.getElementById('banconote-grid').innerHTML=html;
  aggiornaInfo();
}

function addBanconota(v){
  selBanconote[v]++;
  renderBanconote();
}

function resetBanconote(){
  BANCONOTE.forEach(v=>selBanconote[v]=0);
  renderBanconote();
}

function datoTotale(){
  return r(BANCONOTE.reduce((s,v)=>s+v*selBanconote[v],0));
}

function aggiornaInfo(){
  document.getElementById('dato-val').textContent='€ '+fmt(datoTotale());
}

function verifica(){
  let dato = datoTotale();
  let atteso_resto = r(dato-totale);
  let risposta = parseFloat(document.getElementById('resto-input').value.replace(',','.'));
  let fb = document.getElementById('feedback');
  fb.style.display='block';

  if(dato < totale){
    fb.className='feedback err';
    fb.textContent='⚠️ Hai dato troppo poco! Aggiungi ancora qualche banconota.';
    return;
  }
  if(isNaN(risposta)){
    fb.className='feedback err';
    fb.textContent='✏️ Inserisci il resto che ti aspetti!';
    return;
  }
  if(Math.abs(risposta-atteso_resto)<0.01){
    scoreOk++;
    fb.className='feedback ok';
    fb.textContent='🎉 Bravo! Hai pagato € '+fmt(dato)+' per un totale di € '+fmt(totale)+'. Il resto è € '+fmt(atteso_resto)+'. Correttissimo!';
  } else {
    scoreErr++;
    fb.className='feedback err';
    fb.textContent='❌ Quasi! Hai pagato € '+fmt(dato)+', il totale era € '+fmt(totale)+'. Il resto giusto è € '+fmt(atteso_resto)+'. Riprova!';
  }
  document.getElementById('s-ok').textContent=scoreOk;
  document.getElementById('s-err').textContent=scoreErr;
}

nuovoRound();
</script>
</body>
</html>
